<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Grammar Tree</title>

    <!-- PWA -->
    <meta name="theme-color" content="#1a1a2e" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Grammar Tree" />
    <meta name="description" content="Interactive English grammar reference with visual tree structures and tense timelines" />

    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/favicon.svg" color="#4ade80" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <script>
      (function () {
        var saved = localStorage.getItem('theme-override');
        var theme =
          saved === 'light' || saved === 'dark'
            ? saved
            : window.matchMedia('(prefers-color-scheme: light)').matches
              ? 'light'
              : 'dark';
        var el = document.documentElement;
        el.dataset.theme = theme;
        var lng = localStorage.getItem('i18nextLng');
        if (lng) el.lang = String(lng).split('-')[0];
        el.classList.add('no-transitions');
        window.addEventListener('DOMContentLoaded', function () {
          requestAnimationFrame(function () {
            requestAnimationFrame(function () {
              el.classList.remove('no-transitions');
            });
          });
        });
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/app/main.tsx"></script>
  </body>
</html>
