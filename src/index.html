links:[['Perfect Passive exercise','https://www.perfect-english-grammar.com/passive-exercise-2.html',EN],['native-english.ru: пассивный залог','https://www.native-english.ru/grammar/passive-voice',RU]]},
]},

{name:'Косвенная речь',rules:[
{id:'b1_15',text:'Reported Speech — сдвиг времён',note:'"I am tired." → He said he was tired.',
exp:`При переводе в косвенную речь времена «сдвигаются» назад:
<br>• Present Simple → Past Simple: <em>"I work" → he said he worked</em>
<br>• Past Simple → Past Perfect: <em>"I went" → she said she had gone</em>
<br>• Present Perfect → Past Perfect: <em>"I've seen" → he said he had seen</em>
<br>• will → would; can → could; is → was; am going → was going`,
ex:[["She said: 'I am leaving.' → She said she was leaving.",'Она сказала, что уходит.'],["He told me: 'I can't come.' → He told me he couldn't come.",'Он сказал, что не может прийти.']],
links:[['OK English: Reported Speech (видео)','https://ok-english.ru/video-free/',YT],['Reported Speech','https://www.perfect-english-grammar.com/reported-speech.html',EN],['native-english.ru: косвенная речь','https://www.native-english.ru/grammar/indirect-speech',RU]]},

{id:'b1_16',text:'Reported questions — косвенные вопросы',note:'"Where do you live?" → She asked where I lived.',
exp:`В косвенных вопросах:
<br>1. <strong>Нет инверсии</strong> (порядок слов как в утверждении)
<br>2. <strong>Нет вспомогательного do/did</strong>
<br>3. Общие вопросы (Yes/No) → <em>if/whether + подлежащее + глагол</em>`,
ex:[['"Where do you work?" → She asked where I worked.','Она спросила, где я работаю.'],['"Are you married?" → He wanted to know if I was married.','Он хотел знать, женат ли я.']],
links:[['Reported questions','https://www.perfect-english-grammar.com/reported-questions.html',EN],['native-english.ru: косвенная речь','https://www.native-english.ru/grammar/indirect-speech',RU]]},

{id:'b1_17',text:'say vs tell в косвенной речи',note:'He said that... / He told me that... — после tell нужно лицо!',
exp:`<em>say</em> — без обязательного дополнения: <em>She said she was tired.</em>
<br><em>tell</em> — ВСЕГДА с дополнением (кому сказано): <em>She told me she was tired.</em>
<br><br>❌ ~~He told that he was late.~~ ✓ <em>He said that he was late.</em>`,
ex:[['She said she needed help.','Она сказала, что ей нужна помощь.'],['He told us the meeting was cancelled.','Он сообщил нам, что встреча отменена.']],
links:[['Say or tell','https://www.perfect-english-grammar.com/say-or-tell.html',EN],['native-english.ru: косвенная речь','https://www.native-english.ru/grammar/indirect-speech',RU]]},
]},

{name:'Герундий и инфинитив',rules:[
{id:'b1_18',text:'Глаголы + герундий (V-ing)',note:'I enjoy reading. She finished writing. He avoided making mistakes.',
exp:`Эти глаголы требуют после себя герундий (V-ing):
<br><em>enjoy, finish, avoid, mind, suggest, keep, consider, deny, imagine, miss, practise, risk, admit, delay, dislike, fancy, give up, involve, put off, recommend, resist</em>
<br><br>Приём для запоминания: если можно заменить «процессом» — скорее всего герундий.`,
ex:[["I enjoy swimming in the sea.",'Мне нравится купаться в море.'],["She's considering moving abroad.",'Она думает о переезде за рубеж.'],['He avoided making eye contact.','Он избегал зрительного контакта.']],
links:[['Gerunds after verbs','https://www.perfect-english-grammar.com/gerunds.html',EN],['Skyeng упражнения','https://skyeng.ru/exercises/gerund-infinitive/',RU],['native-english.ru: герундий','https://www.native-english.ru/grammar/gerund',RU]]},

{id:'b1_19',text:'Глаголы + инфинитив (to + V)',note:'I want to go. She decided to stay. He managed to finish.',
exp:`Эти глаголы требуют инфинитив с <em>to</em>:
<br><em>want, decide, hope, plan, manage, agree, promise, refuse, fail, expect, offer, learn, need, afford, arrange, attempt, choose, claim, demand, deserve, help, pretend, tend, threaten</em>`,
ex:[['She decided to quit her job.','Она решила уволиться.'],["I hope to see you soon.",'Надеюсь скоро увидеться.'],["He failed to answer.",'Он не смог ответить.']],
links:[['Infinitives after verbs','https://www.perfect-english-grammar.com/infinitives.html',EN],['native-english.ru: инфинитив','https://www.native-english.ru/grammar/infinitive',RU]]},

{id:'b1_20',text:'Глаголы с обоими (like, love, hate, start, begin)',note:'I like reading = I like to read — небольшая разница',
exp:`После <em>like/love/hate/prefer</em> оба варианта возможны:
<br>• V-ing — говорим о действии в целом: <em>I love cooking.</em> (мне вообще нравится готовить)
<br>• to-inf — говорим о конкретном случае: <em>I'd like to cook tonight.</em>
<br><br>После <em>start/begin/continue/cease</em> — разницы практически нет.`,
ex:[['I love travelling / to travel.','Мне нравится путешествовать.'],['She started working / to work here in May.','Она начала работать здесь в мае.']],
links:[['Gerund or infinitive','https://www.perfect-english-grammar.com/gerund-or-infinitive.html',EN],['native-english.ru: герундий','https://www.native-english.ru/grammar/gerund',RU]]},

{id:'b1_21',text:'used to — прошлые привычки и состояния',note:'I used to play football. She used to have long hair.',
exp:`<em>used to</em> — регулярные действия или состояния в прошлом, которые уже прекратились.
<br><br>Форма: <em>used to + инфинитив</em>
<br>Отрицание: <em>didn't use to</em>
<br>Вопрос: <em>Did you use to...?</em>
<br><br>⚠️ Нет формы настоящего времени! Нельзя: ~~I use to~~ для настоящего.
<br>Отличие от <em>be used to</em>: <em>I am used to waking up early</em> = я привык (сейчас).`,
ex:[['I used to smoke, but I stopped.','Я раньше курил, но бросил.'],['Did you use to play an instrument?','Ты раньше играл на инструменте?']],
links:[['OK English: used to (видео)','https://ok-english.ru/video-free/',YT],['Used to','https://www.perfect-english-grammar.com/used-to.html',EN],['native-english.ru: used to','https://www.native-english.ru/grammar/modal-verb-used-to',RU]]},
]},

{name:'Придаточные предложения',rules:[
{id:'b1_22',text:'Относительные придаточные: who, which, that, where, whose',note:'The man who called. The book that I read. The place where we met.',
exp:`<em>who</em> — для людей: <em>The woman who called is my sister.</em>
<br><em>which</em> — для предметов и животных: <em>The book which I borrowed was great.</em>
<br><em>that</em> — для людей и предметов (в определяющих придаточных): <em>The car that he bought is new.</em>
<br><em>where</em> — для мест: <em>The café where we met is closed.</em>
<br><em>whose</em> — принадлежность: <em>The girl whose bag was stolen...</em>
<br><br>В разговорной речи местоимение часто опускается, если оно — дополнение: <em>The film (that) I saw...</em>`,
ex:[['The man who lives next door is very friendly.','Мужчина, который живёт по соседству, очень дружелюбный.'],['The hotel where we stayed had a pool.','Отель, в котором мы жили, был с бассейном.']],
links:[['Relative clauses','https://www.perfect-english-grammar.com/relative-clauses.html',EN],['native-english.ru: относительные местоимения','https://www.native-english.ru/grammar/relative-pronouns',RU]]},

{id:'b1_23',text:'Союзы контраста: although, however, despite, in spite of, whereas',note:'Although it was raining, we went out. Despite the rain, we went.',
exp:`<em>although / even though / though</em> + придаточное предложение.
<br><em>despite / in spite of</em> + существительное / герундий (НЕ придаточное!).
<br><em>however</em> + новое предложение (после точки или точки с запятой).
<br><em>whereas</em> — противопоставление двух фактов.`,
ex:[['Although she was tired, she kept working.','Хотя она устала, она продолжала работать.'],['Despite the rain, he cycled to work.','Несмотря на дождь, он поехал на работу на велосипеде.'],["It was expensive. However, it was worth it.",'Это было дорого. Тем не менее оно того стоило.']],
links:[['Although/despite/however','https://www.perfect-english-grammar.com/although-despite-however.html',EN],['native-english.ru: сложноподчинённые','https://www.native-english.ru/grammar/complex-sentences',RU]]},
]},

{name:'Будущие времена — продвинутые',rules:[
{id:'b1_24',text:'Future Continuous: will be + V-ing',note:'I\'ll be working at 9 tomorrow. She\'ll be flying over the Atlantic.',
exp:`<strong>Future Continuous</strong> = <em>will be + V-ing</em>
<br><br>Значения:
<br>1. Действие, которое будет <strong>в процессе</strong> в конкретный момент будущего: <em>At this time tomorrow, I'll be lying on the beach.</em>
<br>2. Плановое, ожидаемое действие в будущем (естественный ход событий): <em>I'll be seeing her tomorrow anyway.</em>
<br>3. Вежливые вопросы о планах (без нажима): <em>Will you be coming to the party?</em>`,
ex:[["Don't call at 8 — I'll be having dinner.",'Не звони в 8 — я буду ужинать.'],["This time next week I'll be sitting on a beach.",'В это же время на следующей неделе я буду сидеть на пляже.']],
links:[['Future Continuous','https://www.perfect-english-grammar.com/future-continuous.html',EN],['native-english.ru: Future Continuous','https://www.native-english.ru/grammar/future-continuous',RU]]},

{id:'b1_25',text:'Future Perfect: will have + V3',note:'By Friday I will have finished the report. By 2030 they will have built the bridge.',
exp:`<strong>Future Perfect</strong> = <em>will have + V3</em>
<br><br>Действие, которое завершится <strong>до</strong> определённого момента в будущем.
<br>Часто употребляется с <em>by (the time), before</em>: <em>By the time you arrive, I will have cooked dinner.</em>`,
ex:[["I'll have finished this book by Sunday.",'К воскресенью я дочитаю эту книгу.'],['By 2050, scientists will have found a cure.','К 2050 году учёные найдут лекарство.']],
links:[['Future Perfect','https://www.perfect-english-grammar.com/future-perfect.html',EN],['native-english.ru: Future Perfect','https://www.native-english.ru/grammar/future-perfect',RU]]},
]},

{name:'Придаточные цели и причины',rules:[
{id:'b1_26',text:'Придаточные цели: to, in order to, so that, so as to',note:'I study hard to pass. She left early so that she could catch the train.',
exp:`<em>to / in order to / so as to</em> + инфинитив — цель. <em>In order to</em> и <em>so as to</em> чуть формальнее.
<br><em>so that</em> + подлежащее + глагол — цель с другим подлежащим или с модальным.
<br><br>⚠️ Отрицание: <em>in order not to / so as not to</em> (не ~~to not~~).`,
ex:[['She studies hard in order to get a scholarship.','Она усердно учится, чтобы получить стипендию.'],['He left early so that he could catch the last train.','Он ушёл рано, чтобы успеть на последний поезд.']],
links:[['Purpose clauses','https://www.perfect-english-grammar.com/purpose-clauses.html',EN],['native-english.ru: сложноподчинённые','https://www.native-english.ru/grammar/complex-sentences',RU]]},

{id:'b1_27',text:'Фразовые глаголы — основные',note:'give up, look up, turn off, find out, get on, put off, carry on',
exp:`Фразовые глаголы = глагол + частица (предлог или наречие). Значение часто идиоматично.
<br><br>Самые частотные:
<br>• <em>give up</em> = бросить, сдаться
<br>• <em>find out</em> = узнать, выяснить
<br>• <em>turn on/off</em> = включить/выключить
<br>• <em>look up</em> = посмотреть (в словаре/интернете)
<br>• <em>look after</em> = заботиться
<br>• <em>put off</em> = откладывать
<br>• <em>carry on</em> = продолжать
<br>• <em>get on/along</em> = ладить (с кем-то)
<br>• <em>bring up</em> = воспитывать; поднять тему
<br>• <em>come across</em> = наткнуться`,
ex:[["I've given up smoking.",'Я бросил курить.'],["Can you look after my cat while I'm away?",'Ты можешь присмотреть за моей кошкой, пока меня нет?'],['We need to find out what happened.','Нам нужно выяснить, что произошло.']],
links:[['Phrasal verbs list','https://www.perfect-english-grammar.com/phrasal-verbs.html',EN],['Skyeng: фразовые глаголы','https://skyeng.ru/exercises/phrasal-verbs/',RU],['native-english.ru: классификация глаголов','https://www.native-english.ru/grammar/english-verbs',RU]]},
]}
]},

{id:'B2',name:'B2 — Выше среднего',sub:'Upper-Intermediate · 5–8 месяцев',color:'var(--b2)',colorBg:'var(--b2bg)',
categories:[
{name:'Past Perfect',rules:[
{id:'b2_01',text:'Past Perfect Simple: had + V3',note:'By the time she arrived, he had already left.',
exp:`<strong>Past Perfect</strong> — действие, завершившееся <strong>до</strong> другого момента или события в прошлом.
<br><br>Форма: <em>had + V3</em> для всех лиц.
<br>Отрицание: <em>hadn't + V3</em>
<br>Вопрос: <em>Had + подлежащее + V3?</em>
<br><br>Типичные союзы: <em>before, after, when, by the time, already, just, never</em>`,
ex:[['When I arrived, she had already left.','Когда я приехал, она уже ушла.'],['He had never seen snow before that winter.','Он никогда раньше не видел снег до той зимы.']],
links:[['OK English: Past Perfect (видео)','https://ok-english.ru/video-free/',YT],['Past Perfect','https://www.perfect-english-grammar.com/past-perfect.html',EN],['native-english.ru: Past Perfect','https://www.native-english.ru/grammar/past-perfect',RU]]},

{id:'b2_02',text:'Past Perfect Continuous: had been + V-ing',note:'He had been waiting for two hours when she arrived.',
exp:`<strong>Past Perfect Continuous</strong> = had been + V-ing
<br>Акцент на <strong>продолжительности</strong> действия, которое происходило до другого момента в прошлом.
<br>Часто объясняет причину или видимый результат в прошлом.`,
ex:[["She was exhausted — she'd been working all night.",'Она была измотана — она работала всю ночь.'],['How long had you been waiting before she arrived?','Как долго ты ждал до её прихода?']],
links:[['Past Perfect Continuous','https://www.perfect-english-grammar.com/past-perfect-continuous.html',EN],['native-english.ru: Past Perfect Continuous','https://www.native-english.ru/grammar/past-perfect-continuous',RU]]},
]},

{name:'Модальные для прошлого',rules:[
{id:'b2_03',text:'must have + V3 — уверенный вывод о прошлом',note:'She must have forgotten. — я уверен, это единственное объяснение',
exp:`<em>must have + V3</em> = я уверен, что это произошло (единственное логичное объяснение).
<br><br>Шкала уверенности:
<br>• <em>must have done</em> — почти наверняка случилось
<br>• <em>should have done</em> — ожидалось, что случится
<br>• <em>may/might have done</em> — возможно случилось
<br>• <em>can't have done</em> — наверняка не случилось`,
ex:[["You must have been exhausted after that journey.",'Ты, должно быть, очень устал после этой поездки.'],["She must have left early — her coat is gone.",'Она, видимо, ушла рано — её пальто пропало.']],
links:[['OK English: модальные прошлого (видео)','https://ok-english.ru/video-free/',YT],['Modals of deduction past','https://www.perfect-english-grammar.com/modals-of-deduction-past.html',EN],['native-english.ru: модальные глаголы','https://www.native-english.ru/grammar/modal-verbs',RU]]},

{id:'b2_04',text:"can't have + V3 — невозможность в прошлом",note:"She can't have said that! He can't have been there.",
exp:`<em>can't have + V3</em> = я уверен, что этого <strong>не произошло</strong> (это невозможно).
<br>Противоположность <em>must have done</em>.`,
ex:[["He can't have seen her — she was abroad.",'Он не мог её видеть — она была за границей.'],["That can't have been the right address.",'Это не мог быть правильный адрес.']],
links:[["Can't have done",'https://www.perfect-english-grammar.com/modals-of-deduction-past.html',EN],['native-english.ru: can/could','https://www.native-english.ru/grammar/modal-verb-can',RU]]},

{id:'b2_05',text:'should have + V3 — упрёк и сожаление',note:'I should have called. You shouldn\'t have said that.',
exp:`<em>should have + V3</em> = было бы правильно сделать, но не сделал (сожаление, упрёк).
<br><em>shouldn't have + V3</em> = не следовало делать.
<br><br>Это очень употребительная конструкция для выражения сожаления и критики.`,
ex:[["I should have brought an umbrella.",'Надо было взять зонт.'],["She shouldn't have told him the secret.",'Ей не следовало говорить ему секрет.']],
links:[['Should have done','https://www.perfect-english-grammar.com/should-have-done.html',EN],['native-english.ru: should','https://www.native-english.ru/grammar/modal-verb-should',RU]]},

{id:'b2_06',text:'might / could have + V3 — возможность в прошлом',note:'She might have forgotten. It could have been worse.',
exp:`<em>might/could have + V3</em> = возможно это произошло (мы не знаем точно).
<br><br>Также: <em>could have done</em> = мог бы сделать (но не сделал): <em>I could have won if I had tried harder.</em>`,
ex:[["She might have forgotten about the meeting.",'Возможно, она забыла о встрече.'],["He could have left through the back door.",'Он мог выйти через заднюю дверь.']],
links:[['Might have done','https://www.perfect-english-grammar.com/modals-of-deduction-past.html',EN],['native-english.ru: may/might','https://www.native-english.ru/grammar/modal-verb-may',RU]]},
]},

{name:'3-й тип условного и смешанные',rules:[
{id:'b2_07',text:'3-й тип условного: If + Past Perfect, would have + V3',note:'If I had studied harder, I would have passed.',
exp:`Нереальная ситуация в <strong>прошлом</strong> — говорим о том, чего не случилось.
<br><br>Форма: <em>If + Past Perfect, would have + V3</em>
<br><br>Оба элемента нереальны:
<br>• Условие не выполнилось
<br>• Результата тоже не было`,
ex:[["If she had taken the medicine, she would have recovered.",'Если бы она приняла лекарство, она бы выздоровела.'],["If he hadn't left early, he would have met her.",'Если бы он не ушёл рано, он бы встретил её.']],
links:[['OK English: 3rd conditional (видео)','https://ok-english.ru/video-free/',YT],['Third conditional','https://www.perfect-english-grammar.com/third-conditional.html',EN],['native-english.ru: условные предложения','https://www.native-english.ru/grammar/conditional-sentences',RU]]},

{id:'b2_08',text:'Смешанные условные (mixed conditionals)',note:'If I had studied, I would be fluent now. (прошлое → настоящее)',
exp:`Смешанные условные соединяют разные временные планы:
<br><br>1. <strong>Прошлое условие → настоящий результат</strong>:
<br><em>If + Past Perfect, would + инфинитив</em>
<br><em>If I had taken that job, I would be in New York now.</em>
<br><br>2. <strong>Настоящее условие → прошлый результат</strong>:
<br><em>If + Past Simple, would have + V3</em>
<br><em>If she were more careful, she wouldn't have broken it.</em>`,
ex:[['If I had studied medicine, I would be a doctor now.','Если бы я учился на врача, я был бы врачом сейчас.']],
links:[['Mixed conditionals','https://www.perfect-english-grammar.com/mixed-conditionals.html',EN],['native-english.ru: условные предложения','https://www.native-english.ru/grammar/conditional-sentences',RU]]},
]},

{name:'Страдательный залог — продвинутый',rules:[
{id:'b2_09',text:'Future Passive и Passive с модальными',note:'It will be done. It must be fixed. It should be checked.',
exp:`Модальный + Passive: <em>modal + be + V3</em>
<br>• <em>will be done</em> — будет сделано
<br>• <em>must be done</em> — должно быть сделано
<br>• <em>should be done</em> — следует сделать
<br>• <em>can be done</em> — может быть сделано`,
ex:[['The report will be published tomorrow.','Отчёт будет опубликован завтра.'],['This mistake must be corrected immediately.','Эта ошибка должна быть немедленно исправлена.']],
links:[['Passive with modals','https://www.perfect-english-grammar.com/passive.html',EN],['native-english.ru: пассивный залог','https://www.native-english.ru/grammar/passive-voice',RU]]},

{id:'b2_10',text:'Causative have/get: have something done',note:'I had my hair cut. She got her car fixed.',
exp:`<em>have/get + объект + V3</em> — вы заказываете услугу или кто-то делает что-то за вас.
<br><br>Сравни:
<br>• <em>I cut my hair.</em> — я сам подстриг (что нетипично)
<br>• <em>I had my hair cut.</em> — подстрижен парикмахером
<br><br><em>get</em> чуть более разговорный, <em>have</em> чуть формальнее.`,
ex:[['I need to have my teeth checked.','Мне нужно проверить зубы у врача.'],['She had her house painted last spring.','Прошлой весной она покрасила дом (наняв рабочих).']],
links:[['Have something done','https://www.perfect-english-grammar.com/have-something-done.html',EN],['native-english.ru: пассивный залог','https://www.native-english.ru/grammar/passive-voice',RU]]},

{id:'b2_11',text:'Passive reporting verbs: It is said that... / He is believed to...',note:'It is thought that prices will rise. She is known to be honest.',
exp:`Два варианта конструкции с глаголами <em>say, think, believe, report, know, expect, consider</em>:
<br><br>1. <em>It + passive + that + придаточное</em>: <em>It is believed that...</em>
<br>2. <em>Подлежащее + is + V3 + to-infinitive</em>: <em>She is believed to be...</em>
<br><br>Используется в новостях и официальных текстах.`,
ex:[['It is reported that three people were injured.','Сообщается, что три человека получили ранения.'],['He is thought to have left the country.','Считается, что он покинул страну.']],
links:[['Passive reporting verbs','https://www.perfect-english-grammar.com/passive-reporting-verbs.html',EN],['native-english.ru: пассивный залог','https://www.native-english.ru/grammar/passive-voice',RU]]},
]},

{name:'Герундий — нюансы',rules:[
{id:'b2_12',text:'remember / forget + V-ing vs to-inf — разница в значении',note:'I remember locking it (факт прошлого) vs Remember to lock it (задача)',
exp:`<em>remember/forget + V-ing</em> — о прошлом событии, которое помним/забыли.
<br><em>remember/forget + to-inf</em> — о задаче: не забыть сделать что-то в будущем.`,
ex:[['I remember meeting her at a conference. (это было)','Я помню, что встретил её на конференции.'],['Remember to call your mother! (нужно сделать)','Не забудь позвонить маме!'],["I forgot to buy milk. (не сделал)",'Я забыл купить молоко.']],
links:[['Remember/forget','https://www.perfect-english-grammar.com/gerund-or-infinitive-exercise-1.html',EN],['native-english.ru: герундий','https://www.native-english.ru/grammar/gerund',RU]]},

{id:'b2_13',text:'stop / regret / mean + V-ing vs to-inf',note:'She stopped smoking (бросила) vs She stopped to smoke (остановилась, чтобы)',
exp:`<em>stop + V-ing</em> — прекратить действие.
<br><em>stop + to-inf</em> — остановиться, чтобы сделать что-то другое.
<br><br><em>regret + V-ing</em> — сожалеть о прошлом.
<br><em>regret + to-inf</em> — с сожалением сообщать (формально): <em>I regret to inform you...</em>
<br><br><em>mean + V-ing</em> — означать: <em>This means working harder.</em>
<br><em>mean + to-inf</em> — намереваться: <em>I meant to call you.</em>`,
ex:[['He stopped smoking last year.','Он бросил курить в прошлом году.'],['She stopped to look at the view.','Она остановилась, чтобы полюбоваться видом.']],
links:[['Stop/regret/mean','https://www.perfect-english-grammar.com/gerund-or-infinitive.html',EN],['native-english.ru: герундий','https://www.native-english.ru/grammar/gerund',RU]]},
]},

{name:'Wish и сослагательное',rules:[
{id:'b2_14',text:'wish + Past Simple — желание изменить настоящее',note:'I wish I knew the answer. I wish I had more time.',
exp:`<em>wish + Past Simple</em> — о нереальном желании в настоящем.
<br>Форма такая же, как в 2-м типе условного. Для <em>to be</em> — <em>were</em> (формально), хотя <em>was</em> тоже используется.`,
ex:[['I wish I spoke better English.','Жаль, что я не говорю по-английски лучше.'],['She wishes she lived in a warmer country.','Ей бы хотелось жить в более тёплой стране.']],
links:[['OK English: wish (видео)','https://ok-english.ru/video-free/',YT],['Wish','https://www.perfect-english-grammar.com/wish.html',EN],['native-english.ru: сослагательное наклонение','https://www.native-english.ru/grammar/subjunctive-mood',RU]]},

{id:'b2_15',text:'wish + Past Perfect — сожаление о прошлом',note:'I wish I had studied harder. I wish I hadn\'t said that.',
exp:`<em>wish + Past Perfect</em> — сожаление о прошлых событиях, которые уже нельзя изменить. Форма как в 3-м типе условного.`,
ex:[["I wish I hadn't eaten so much.",'Жаль, что я так много съел.'],["She wishes she had taken that job offer.",'Ей жаль, что она не приняла то предложение о работе.']],
links:[['Wish + Past Perfect','https://www.perfect-english-grammar.com/wish.html',EN],['native-english.ru: сослагательное наклонение','https://www.native-english.ru/grammar/subjunctive-mood',RU]]},

{id:'b2_16',text:'wish + would — желание изменить чужое поведение',note:'I wish you would stop talking. I wish it would warm up.',
exp:`<em>wish + would</em> — раздражение из-за чужого поведения или желание изменить ситуацию.
<br>⚠️ Нельзя использовать о себе: ~~I wish I would~~ — только о других лицах или погоде/ситуации.`,
ex:[['I wish you would listen to me.','Я бы хотел, чтобы ты меня слушал.'],['I wish it would stop raining.','Хотелось бы, чтобы дождь прекратился.']],
links:[['Wish + would','https://www.perfect-english-grammar.com/wish.html',EN],['native-english.ru: would','https://www.native-english.ru/grammar/modal-verb-would',RU]]},
]},

{name:'Относительные придаточные — нюансы',rules:[
{id:'b2_17',text:'Определяющие vs неопределяющие придаточные',note:'The man who called (определяет какой) vs My brother, who called, (добавляет инфо)',
exp:`<strong>Определяющие</strong> (defining): без запятых — уточняют, о ком/чём речь. Местоимение можно заменить на <em>that</em>. Нельзя убрать без потери смысла.
<br><br><strong>Неопределяющие</strong> (non-defining): с запятыми — добавляют информацию, не меняя смысла. <em>That</em> <strong>нельзя</strong> использовать. Можно убрать.
<br><br>⚠️ <em>which</em> в неопределяющих может относиться ко всему предложению: <em>She passed the exam, which surprised everyone.</em>`,
ex:[['The film that I told you about is on tonight. (какой именно)','Фильм, о котором я тебе говорил, идёт сегодня вечером.'],['My sister, who lives in Paris, is visiting next week. (доп. инфо)','Моя сестра, которая живёт в Париже, приедет на следующей неделе.']],
links:[['Relative clauses defining/non-defining','https://www.perfect-english-grammar.com/relative-clauses.html',EN],['native-english.ru: относительные местоимения','https://www.native-english.ru/grammar/relative-pronouns',RU]]},

{id:'b2_18',text:'Предлоги в относительных придаточных',note:'the person I work with / the person with whom I work (формально)',
exp:`В разговорной речи предлог стоит в конце: <em>the house I grew up in.</em>
<br>В письменной/формальной речи предлог перед <em>which/whom</em>: <em>the house in which I grew up.</em>
<br><br>После предлога — только <em>which</em> (для вещей) и <em>whom</em> (для людей). Никогда <em>that</em>!`,
ex:[["The project I'm working on is fascinating. (разг.)",'Проект, над которым я работаю, очень интересный.'],['The project on which I am working is fascinating. (форм.)','']],
links:[['Prepositions in relative clauses','https://www.perfect-english-grammar.com/relative-clauses.html',EN],['native-english.ru: относительные местоимения','https://www.native-english.ru/grammar/relative-pronouns',RU]]},
]},

{name:'Связующие слова и союзы',rules:[
{id:'b2_19',text:'Союзы следствия: so... that, such... that, therefore, as a result',note:'It was so cold that we stayed inside. She worked hard; therefore, she passed.',
exp:`<em>so + прилагательное/наречие + that</em>: <em>He spoke so quickly that nobody understood.</em>
<br><em>such + (a/an) + прилагательное + существительное + that</em>: <em>It was such a long film that I fell asleep.</em>
<br><br>Связующие слова результата (между предложениями): <em>therefore, consequently, as a result, hence, thus</em>.`,
ex:[["It was such a good book that I read it twice.",'Книга была такой хорошей, что я прочитал её дважды.'],["She missed the deadline; consequently, she lost the contract.",'Она пропустила дедлайн; как следствие, потеряла контракт.']],
links:[['So and such','https://www.perfect-english-grammar.com/so-and-such.html',EN],['native-english.ru: сложноподчинённые','https://www.native-english.ru/grammar/complex-sentences',RU]]},

{id:'b2_20',text:'be used to / get used to + V-ing — привычка (настоящая)',note:'I\'m used to waking up early. She\'s getting used to the cold.',
exp:`<em>be used to + V-ing / noun</em> = быть привыкшим (уже привык).
<br><em>get used to + V-ing / noun</em> = привыкать (процесс привыкания).
<br><br>⚠️ Не путать с <em>used to + инфинитив</em> (прошлые привычки).
<br>• <em>I used to live in Paris.</em> — раньше жил (уже нет)
<br>• <em>I am used to living in big cities.</em> — привык жить в больших городах`,
ex:[["I'm not used to getting up so early.",'Я не привык вставать так рано.'],["It took time, but she got used to the new system.",'Понадобилось время, но она привыкла к новой системе.']],
links:[['Used to / be used to','https://www.perfect-english-grammar.com/used-to.html',EN],['native-english.ru: used to','https://www.native-english.ru/grammar/modal-verb-used-to',RU]]},
]},

{name:'Расширенные модальные и Future in the Past',rules:[
{id:'b2_21',text:'Future in the Past: would / was going to',note:'She said she would call. He was going to leave.',
exp:`<strong>Future in the Past</strong> — конструкции, выражающие будущее с точки зрения прошлого. Используются в косвенной речи и нарративе.\n<br><br>• <em>would + V</em> (из will): <em>She said she would come.</em>\n<br>• <em>was/were going to + V</em>: <em>He was going to call but forgot.</em>\n<br>• <em>was about to + V</em>: <em>She was about to leave when he arrived.</em>`,
ex:[['She promised she would be there.','Она обещала, что придёт.'],['He was about to leave when she called.','Он собирался уходить, когда она позвонила.']],
links:[['native-english.ru: Future in the Past','https://www.native-english.ru/grammar/future-in-the-past',RU]]},

{id:'b2_22',text:'be to — официальное назначение и предписание',note:'You are to report by Monday. They were never to meet again.',
exp:`<em>be to + инфинитив</em> — официальные распоряжения, плановые события и судьба в нарративе.\n<br><br>1. Официальное предписание: <em>Passengers are to remain seated.</em>\n<br>2. Официальный план: <em>The summit is to take place next month.</em>\n<br>3. Судьба в нарративе: <em>They were never to meet again.</em>`,
ex:[['You are to submit the report by Friday.','Вы должны сдать отчёт к пятнице.'],['She was to become one of the greatest scientists of her time.','Ей суждено было стать одним из величайших учёных.']],
links:[['native-english.ru: be to','https://www.native-english.ru/grammar/modal-verb-be-to',RU]]},

{id:'b2_23',text:'ought to — моральный долг и логическое ожидание',note:'You ought to apologise. She ought to have told us.',
exp:`<em>ought to</em> — моральная обязанность или логическое ожидание. Сильнее <em>should</em>.\n<br>Всегда с to: <em>ought to go</em> (в отличие от should).\n<br>Для прошлого: <em>ought to have + V3</em> — упрёк или сожаление.`,
ex:[['You ought to apologise for what you said.','Тебе следует извиниться за то, что ты сказал.'],['She ought to have told us earlier.','Ей следовало сказать нам раньше.']],
links:[['native-english.ru: ought to','https://www.native-english.ru/grammar/modal-verb-ought-to',RU],['Ought to','https://www.perfect-english-grammar.com/ought-to.html',EN]]},

{id:'b2_24',text:'need — модальный и обычный глагол',note:"You needn't worry. / She doesn't need to come.",
exp:`<em>need</em> как модальный (формальный, в вопросах/отрицаниях) и как обычный глагол.\n<br><br><strong>Модальный</strong> (без -s, без to):\n<br>• <em>You needn't worry.</em> / <em>Need I explain?</em>\n<br><br><strong>Обычный need + to</strong>:\n<br>• <em>She doesn't need to come.</em>`,
ex:[["You needn't fill in both forms.",'Не нужно заполнять обе формы.'],["She doesn't need to attend every meeting.",'Ей не обязательно присутствовать на каждом собрании.']],
links:[['native-english.ru: need','https://www.native-english.ru/grammar/modal-verb-need',RU]]},

{id:'b2_25',text:'dare — смелость и вызов',note:"How dare you! I daren't ask. She dared to challenge him.",
exp:`<em>dare</em> — отважиться, осмелиться. Модальный в риторических вопросах и отрицаниях.\n<br><br><strong>Модальный</strong>: <em>How dare you! / I daren't ask. / Dare I say...</em>\n<br><strong>Обычный</strong>: <em>She didn't dare to look. / He dared to challenge the boss.</em>\n<br><br>⚠️ <em>I dare say</em> = пожалуй, вероятно (устойчивое выражение).`,
ex:[['How dare you speak to me like that!','Как ты смеешь так со мной разговаривать!'],['She dared to express her opinion openly.','Она осмелилась открыто высказать своё мнение.']],
links:[['native-english.ru: dare','https://www.native-english.ru/grammar/modal-verb-dare',RU]]},
]},

{name:'Местоимения, существительные и числа',rules:[
{id:'b2_26',text:'Возвратные местоимения: myself, yourself, himself...',note:'I hurt myself. She did it herself. They enjoyed themselves.',
exp:`<em>myself, yourself, himself, herself, itself, ourselves, yourselves, themselves</em>.\n<br><br>1. Действие направлено на субъект: <em>He cut himself.</em>\n<br>2. Эмфаза (сам/сама, без помощи): <em>I did it myself.</em>\n<br><br>Устойчивые: <em>by myself</em> = в одиночку; <em>help yourself</em> = угощайся.`,
ex:[['She taught herself to play the guitar.','Она сама научила себя играть на гитаре.'],['The machine turns itself off automatically.','Машина автоматически выключается.']],
links:[['native-english.ru: возвратные местоимения','https://www.native-english.ru/grammar/reflexive-pronouns',RU],['Reflexive pronouns','https://www.perfect-english-grammar.com/reflexive-pronouns.html',EN]]},

{id:'b2_27',text:'Собирательные существительные: team, family, committee...',note:'The team are playing well. (BrE) / The team is playing. (AmE)',
exp:`Собирательные существительные — группа как единое целое.\n<br><br>• <strong>BrE</strong>: обычно мн. число: <em>The team are playing.</em>\n<br>• <strong>AmE</strong>: обычно ед. число: <em>The team is playing.</em>\n<br><br>Частые: <em>team, family, government, committee, staff, audience, crew, police, army, public, management</em>`,
ex:[['The government have announced new measures. (BrE)','Правительство объявило о новых мерах.'],['The audience were on their feet. (BrE)','Зрители вскочили на ноги.']],
links:[['native-english.ru: собирательные существительные','https://www.native-english.ru/grammar/collective-nouns',RU]]},

{id:'b2_28',text:'Дробные числительные и математика',note:'a half, three quarters, 5.7 = five point seven, 25%',
exp:`Дроби: <em>½ = a half; ⅓ = a third; ¼ = a quarter; ¾ = three quarters; ⅔ = two thirds</em>.\n<br>Числитель — количественное, знаменатель — порядковое (мн. если числитель > 1).\n<br><br>Десятичные: точка (не запятая): <em>3.14 = three point one four</em>.\n<br>Математика: <em>+ = plus; - = minus; × = times; ÷ = divided by; = = equals</em>.`,
ex:[['Three quarters of students passed the exam.','Три четверти студентов сдали экзамен.'],['The inflation rate fell to 2.5 percent.','Уровень инфляции снизился до 2,5 процента.']],
links:[['native-english.ru: дробные числительные','https://www.native-english.ru/grammar/fractional-numerals',RU]]},

{id:'b2_29',text:'Степени сравнения наречий',note:'faster, more carefully, best, worse, further',
exp:`Наречия образуют степени сравнения по тем же правилам, что и прилагательные.\n<br><br>• Односложные: + <em>er/est</em>: <em>fast→faster, hard→harder, early→earlier</em>\n<br>• Большинство на <em>-ly</em>: <em>more/most</em>: <em>carefully→more carefully→most carefully</em>\n<br>• Неправильные: <em>well→better→best, badly→worse→worst, far→further→furthest, little→less→least, much→more→most</em>`,
ex:[['She spoke more confidently than before.','Она говорила увереннее, чем раньше.'],['He works hardest in the team.','Он работает усерднее всех в команде.']],
links:[['native-english.ru: степени сравнения наречий','https://www.native-english.ru/grammar/adverbs-degrees-of-comparison',RU]]},
]},
]},

{id:'C1',name:'C1 — Продвинутый',sub:'Advanced · 8–12 месяцев',color:'var(--c1)',colorBg:'var(--c1bg)',
categories:[
{name:'Инверсия (Inversion)',rules:[
{id:'c1_01',text:'Инверсия с отрицательными наречиями',note:'Never have I seen this. Rarely does she complain.',
exp:`Для эмфазы отрицательное наречие/выражение выносится в начало → вспомогательный глагол перед подлежащим (порядок слов как в вопросе).
<br><br>Слова, запускающие инверсию: <em>never, rarely, seldom, little, hardly, scarcely, barely, not only, only, no sooner</em>`,
ex:[['Never have I seen anything so beautiful.','Никогда я не видел ничего столь прекрасного.'],['Rarely does she make a mistake.','Она редко ошибается.'],['Little did I know what was coming.','Я и не подозревал, что меня ждёт.']],
links:[['Inversion','https://www.perfect-english-grammar.com/inversion.html',EN],['British Council: inversion','https://learnenglish.britishcouncil.org/grammar/c1-grammar/inversion',EN],['native-english.ru: инверсия','https://www.native-english.ru/grammar/inversion',RU]]},

{id:'c1_02',text:'Not only... but also с инверсией',note:'Not only did he apologise, but he also offered to help.',
exp:`<em>Not only + инверсия в первой части</em>, вторая часть — обычный порядок.
<br>Используется для усиления: выражает, что что-то пошло дальше ожидаемого.`,
ex:[['Not only is she talented, but she is also very hard-working.','Она не только талантлива, но и очень трудолюбива.'],["Not only did they arrive late, but they also forgot the documents.",'Они не только опоздали, но и забыли документы.']],
links:[['Not only but also','https://learnenglish.britishcouncil.org/grammar/c1-grammar/inversion',EN],['native-english.ru: инверсия','https://www.native-english.ru/grammar/inversion',RU]]},

{id:'c1_03',text:'Hardly / Scarcely / No sooner + инверсия',note:'Hardly had I sat down when the phone rang.',
exp:`Конструкции немедленной последовательности:
<br>• <em>Hardly/Scarcely + had + подлежащее + V3 + when/before + Past Simple</em>
<br>• <em>No sooner + had + подлежащее + V3 + than + Past Simple</em>`,
ex:[['Hardly had she arrived when it started to rain.','Она едва приехала, как начался дождь.'],['No sooner had I sat down than someone knocked at the door.','Я только сел, как кто-то постучал в дверь.']],
links:[['Hardly/Scarcely','https://learnenglish.britishcouncil.org/grammar/c1-grammar/inversion',EN],['native-english.ru: инверсия','https://www.native-english.ru/grammar/inversion',RU]]},

{id:'c1_04',text:'Инверсия в условных: Had / Were / Should',note:'Had I known (= If I had known). Were I you (= If I were you).',
exp:`Формальный стиль — исключает <em>if</em>, использует инверсию:
<br>• <em>Had + подлежащее + V3</em> = If + Past Perfect (3-й тип)
<br>• <em>Were + подлежащее (+ to + инфинитив)</em> = If + Past Simple (2-й тип)
<br>• <em>Should + подлежащее + инфинитив</em> = If (маловероятное, 1-й тип)`,
ex:[['Had she told me, I would have helped.','Скажи она мне, я бы помог.'],['Were I in your position, I would accept.','На вашем месте я бы согласился.'],['Should you need assistance, please call us.','Если вам потребуется помощь, позвоните нам.']],
links:[['Inversion in conditionals','https://learnenglish.britishcouncil.org/grammar/c1-grammar/inversion',EN],['native-english.ru: условные предложения','https://www.native-english.ru/grammar/conditional-sentences',RU]]},
]},

{name:'Клефт-предложения',rules:[
{id:'c1_05',text:'It-cleft: It was John who called.',note:'Для выделения любого члена предложения',
exp:`Структура: <em>It + to be + выделяемый элемент + who/that/which + остальное</em>
<br>Переносит фокус внимания на выделяемый элемент.
<br><br>• Для людей — <em>who</em>; для вещей/обстоятельств — <em>that/which</em>.`,
ex:[['It was the noise that woke me up. (не шум вообще, именно этот)','Именно шум разбудил меня.'],['It is hard work that leads to success.','Именно упорный труд ведёт к успеху.']],
links:[['Cleft sentences','https://www.perfect-english-grammar.com/cleft-sentences.html',EN],['British Council: cleft','https://learnenglish.britishcouncil.org/grammar/c1-grammar/cleft-sentences',EN],['native-english.ru: порядок слов','https://www.native-english.ru/grammar/word-order',RU]]},

{id:'c1_06',text:'Wh-cleft: What surprised me was the price.',note:'What I need is rest. What she said shocked everyone.',
exp:`Структура: <em>What + придаточное + to be + выделяемый элемент</em>
<br>Подчёркивает важность элемента, вводимого в конце.`,
ex:[['What I love about London is the diversity.','Больше всего в Лондоне мне нравится разнообразие.'],["What he did was completely unexpected.",'То, что он сделал, было совершенно неожиданным.']],
links:[['Cleft sentences','https://learnenglish.britishcouncil.org/grammar/c1-grammar/cleft-sentences',EN],['native-english.ru: порядок слов','https://www.native-english.ru/grammar/word-order',RU]]},
]},

{name:'Сослагательное наклонение',rules:[
{id:'c1_07',text:'Формальное сослагательное после глаголов требования',note:'I suggest he leave. It is vital that she be informed.',
exp:`После <em>suggest, recommend, insist, demand, propose, request, require, ask, advise, order + that</em> — базовая форма глагола для <strong>всех лиц</strong> (без <em>-s</em>, без <em>was</em>).
<br><br>Британский вариант часто использует <em>should</em> вместо сослагательного: <em>I suggest that he should leave.</em>
<br>Американский — чаще чистое сослагательное.`,
ex:[['I recommend that he see a doctor.','Я рекомендую ему обратиться к врачу.'],['It is essential that all students attend the meeting.','Крайне важно, чтобы все студенты присутствовали на собрании.']],
links:[['Subjunctive','https://www.perfect-english-grammar.com/subjunctive.html',EN],['British Council: subjunctive','https://learnenglish.britishcouncil.org/grammar/c1-grammar/subjunctive',EN],['native-english.ru: сослагательное наклонение','https://www.native-english.ru/grammar/subjunctive-mood',RU]]},

{id:'c1_08',text:'It\'s high time + Past Simple',note:'It\'s high time you went to bed. It\'s time we left.',
exp:`<em>It's (high/about) time + подлежащее + Past Simple</em>
<br>Значение: настоящее/будущее — говорим о том, что давно нужно было сделать.
<br><em>high time</em> — ещё сильнее: уже давно пора!`,
ex:[["It's time she found a new job.",'Ей давно пора найти новую работу.'],["It's high time you apologised.",'Уже давно пора извиниться.']],
links:[['It\'s time','https://www.perfect-english-grammar.com/subjunctive.html',EN],['native-english.ru: сослагательное наклонение','https://www.native-english.ru/grammar/subjunctive-mood',RU]]},

{id:'c1_09',text:'as if / as though + сослагательное',note:'She talks as if she knew everything. He looked as though he had seen a ghost.',
exp:`<em>as if / as though + Past Simple</em> — нереальное сравнение в настоящем.
<br><em>as if / as though + Past Perfect</em> — нереальное сравнение о прошлом.`,
ex:[['He spends money as if he were a millionaire.','Он тратит деньги, как будто он миллионер.'],['She spoke as though she had met him before.','Она говорила так, как будто уже встречала его раньше.']],
links:[['As if / as though','https://www.perfect-english-grammar.com/subjunctive.html',EN],['native-english.ru: сослагательное наклонение','https://www.native-english.ru/grammar/subjunctive-mood',RU]]},
]},

{name:'Эллипсис и замещение',rules:[
{id:'c1_10',text:'So / Neither + вспомогательный глагол + подлежащее',note:'So do I. Neither does she. So am I.',
exp:`<em>So + вспомогательный + подлежащее</em> — согласие с утвердительным.
<br><em>Neither/Nor + вспомогательный + подлежащее</em> — согласие с отрицательным.
<br>Вспомогательный глагол должен совпадать со временем исходного предложения.`,
ex:[["I love jazz. So does she.",'Я люблю джаз. Она тоже.'],["I haven't been to Rome. Neither have I.",'Я не был в Риме. Я тоже.']],
links:[['So / Neither','https://www.perfect-english-grammar.com/so-neither.html',EN],['native-english.ru: сложносочинённые','https://www.native-english.ru/grammar/compound-sentences',RU]]},

{id:'c1_11',text:'I think so / I hope so / I\'m afraid so',note:'Will it rain? — I think so. / I hope not.',
exp:`<em>so</em> заменяет придаточное предложение после: <em>think, hope, suppose, expect, believe, imagine, be afraid</em>.
<br>Отрицательная форма: <em>not</em> (не <em>so not</em>!).`,
ex:[["Will he come? — I think so. / I don't think so.",'Он придёт? — Думаю, да. / Не думаю.'],['Is it expensive? — I\'m afraid so.','Это дорого? — Боюсь, что да.'],['Is it closed? — I hope not.','Закрыто? — Надеюсь, что нет.']],
links:[['I think so / I hope so','https://www.perfect-english-grammar.com/so-not.html',EN],['native-english.ru: сложносочинённые','https://www.native-english.ru/grammar/compound-sentences',RU]]},
]},

{name:'Придаточные — продвинутый',rules:[
{id:'c1_12',text:'Включающие vs невключающие придаточные',note:'The man who called is my brother. VS My brother, who called, is a doctor.',
exp:`<strong>Включающее (defining)</strong>: уточняет, о ком/чём речь — без запятых. <em>that</em> можно. Местоимение можно опустить если оно дополнение.
<br><br><strong>Невключающее (non-defining)</strong>: добавляет информацию — обязательны запятые. Только <em>who/which</em> (не <em>that</em>!). Местоимение нельзя опускать.`,
ex:[['The film that won the Oscar was brilliant. (определяет, о каком фильме речь)','Фильм, который выиграл Оскар, был великолепен.'],['Avatar, which came out in 2009, was a huge hit. (доп. факт о и так известном фильме)','Аватар, вышедший в 2009, стал большим хитом.']],
links:[['Defining vs non-defining','https://www.perfect-english-grammar.com/defining-and-non-defining-relative-clauses.html',EN],['British Council','https://learnenglish.britishcouncil.org/grammar/c1-grammar/relative-clauses-advanced',EN],['native-english.ru: относительные местоимения','https://www.native-english.ru/grammar/relative-pronouns',RU]]},

{id:'c1_13',text:'Предлог + which/whom в формальном стиле',note:'The company for which I work. The person with whom I spoke.',
exp:`Формальный стиль: <em>предлог + which/whom</em> перед относительным местоимением.
<br>Неформальный эквивалент: предлог в конец предложения.
<br><em>whom</em> — формальная объектная форма <em>who</em>.`,
ex:[['The report to which I referred is attached. (формально)','Упомянутый мной отчёт прилагается.'],['The report which I referred to is attached. (нейтрально)',''],['The report I referred to is attached. (разговорно)','']],
links:[['Relative clauses advanced','https://learnenglish.britishcouncil.org/grammar/c1-grammar/relative-clauses-advanced',EN],['native-english.ru: относительные местоимения','https://www.native-english.ru/grammar/relative-pronouns',RU]]},
]},

{name:'Номинализация',rules:[
{id:'c1_14',text:'Номинализация — основы',note:'decide→decision, discover→discovery, improve→improvement',
exp:`Номинализация — преобразование глаголов/прилагательных в существительные. Признак академического и делового стиля.
<br><br>Основные суффиксы:
<br>• <em>-tion/-sion</em>: decide→decision, discuss→discussion
<br>• <em>-ment</em>: improve→improvement, develop→development
<br>• <em>-ance/-ence</em>: appear→appearance, differ→difference
<br>• <em>-ity</em>: complex→complexity, able→ability
<br>• <em>-ness</em>: happy→happiness, aware→awareness`,
ex:[['She decided to expand. → Our decision to expand the company...','Наше решение о расширении...'],['He discovered that... → His discovery of the error...','Его открытие ошибки...']],
links:[['Nominalisation','https://learnenglish.britishcouncil.org/grammar/c1-grammar/nominalisation',EN],['native-english.ru: существительное','https://www.native-english.ru/grammar/english-nouns',RU]]},

{id:'c1_15',text:'Номинализация в академическом тексте',note:'The fact that prices increased → The increase in prices...',
exp:`Номинализация позволяет:
<br>1. Сжать информацию: <em>There was a significant increase in prices.</em>
<br>2. Добавить определения: <em>The rapid increase in house prices...</em>
<br>3. Создать формальный, безличный тон.`,
ex:[['There has been a significant improvement in air quality.','Качество воздуха значительно улучшилось.'],['His refusal to comment surprised everyone.','Его отказ комментировать удивил всех.']],
links:[['Academic writing nominalisation','https://learnenglish.britishcouncil.org/grammar/c1-grammar/nominalisation',EN],['native-english.ru: существительное','https://www.native-english.ru/grammar/english-nouns',RU]]},
]},

{name:'Причастные обороты',rules:[
{id:'c1_16',text:'Причастный оборот настоящего: V-ing clause',note:'Walking down the street, I saw an old friend. Having no money, he couldn\'t buy food.',
exp:`Причастный оборот с Present Participle (V-ing) заменяет придаточное предложение:
<br>• Одновременность: <em>Walking home, I noticed something strange.</em> (= While I was walking home)
<br>• Причина: <em>Knowing the answer, she raised her hand.</em> (= Because she knew)
<br><br>⚠️ Субъект причастного оборота ДОЛЖЕН совпадать с подлежащим главного предложения!
<br>Ошибка: ~~Walking down the street, the rain started.~~ (дождь не шёл по улице)`,
ex:[['Arriving at the airport, he realised he had forgotten his passport.','Прибыв в аэропорт, он понял, что забыл паспорт.'],['Not knowing what to do, she called her mother.','Не зная, что делать, она позвонила маме.']],
links:[['Participle clauses','https://www.perfect-english-grammar.com/participle-clauses.html',EN],['British Council','https://learnenglish.britishcouncil.org/grammar/c1-grammar/participle-clauses',EN],['native-english.ru: причастие','https://www.native-english.ru/grammar/participle',RU]]},

{id:'c1_17',text:'Причастный оборот прошедшего: V3 / Having + V3 clause',note:'Written in 1815, the novel... Having finished work, she went home.',
exp:`<em>V3 clause</em> (Past Participle) = пассивный смысл: <em>Built in 1889, the Eiffel Tower...</em>
<br><br><em>Having + V3</em> = действие, завершённое раньше основного:
<br><em>Having read the report, he called a meeting.</em> (= After he had read...)`,
ex:[['Surprised by the news, she sat down silently.','Удивлённая новостью, она молча села.'],['Having finished the exam, the students left the room.','Закончив экзамен, студенты покинули аудиторию.']],
links:[['Participle clauses','https://learnenglish.britishcouncil.org/grammar/c1-grammar/participle-clauses',EN],['native-english.ru: причастие','https://www.native-english.ru/grammar/participle',RU]]},
]}
]},

{id:'C2',name:'C2 — Мастерство',sub:'Proficiency · 1–2+ года',color:'var(--c2)',colorBg:'var(--c2bg)',
categories:[
{name:'Условные — полная система',rules:[
{id:'c2_01',text:'Условные с unless / provided / as long as / on condition that',note:'Unless you study, you\'ll fail. As long as you\'re honest, I\'ll help.',
exp:`<em>unless</em> = if not (но нельзя использовать с отрицанием!): <em>Unless you hurry</em> = <em>If you don't hurry</em>
<br><em>provided/providing (that)</em> = if and only if (строгое условие)
<br><em>as long as</em> = при условии, что (допущение)
<br><em>on condition that</em> = на условии, что (формально)
<br><em>in case</em> = на случай, если`,
ex:[["I'll lend you money, as long as you pay me back.",'Я одолжу тебе деньги, при условии что ты вернёшь.'],["You can use my laptop, provided you don't download anything.",'Можешь использовать мой ноутбук, при условии что ничего не скачаешь.']],
links:[['Advanced conditionals','https://www.perfect-english-grammar.com/conditionals-advanced.html',EN],['native-english.ru: условные предложения','https://www.native-english.ru/grammar/conditional-sentences',RU]]},

{id:'c2_02',text:'Suppose / supposing / what if',note:'Suppose you won the lottery — what would you do?',
exp:`<em>Suppose/Supposing</em> — используются как <em>if</em> в гипотетических вопросах.
<br><em>What if</em> — неформальный аналог.
<br><br>С Past Simple — ситуация маловероятная или воображаемая.`,
ex:[['Supposing you had to choose — which would you pick?','Представь, что тебе нужно выбрать — что бы ты выбрал?'],['What if nobody comes? What should we do?','А вдруг никто не придёт? Что нам делать?']],
links:[['Suppose/supposing','https://www.perfect-english-grammar.com/conditionals-advanced.html',EN],['native-english.ru: условные предложения','https://www.native-english.ru/grammar/conditional-sentences',RU]]},
]},

{name:'Инверсия — полная система',rules:[
{id:'c2_03',text:'Only + обстоятельство + инверсия',note:'Only when I left did I realise. Only then did he understand.',
exp:`<em>Only + when/after/if/then/by/in/on</em> — вся группа выносится в начало → инверсия.
<br><br>Это один из самых мощных риторических приёмов в письменной и ораторской речи.`,
ex:[['Only when you experience it can you truly understand.','Только пережив это, можно по-настоящему понять.'],['Only after years of practice did she master the skill.','Лишь после многих лет практики она овладела навыком.']],
links:[['Advanced inversion','https://learnenglish.britishcouncil.org/grammar/c1-grammar/inversion',EN],['native-english.ru: инверсия','https://www.native-english.ru/grammar/inversion',RU]]},

{id:'c2_04',text:'So + прилагательное/наречие + инверсия',note:'So great was his relief that he wept. Such was her talent...',
exp:`Книжный и ораторский стиль.
<br><em>So + adj/adv + be/aux + подлежащее</em>
<br><em>Such + was/were + подлежащее</em>`,
ex:[['So rapid was the change that nobody could adapt.','Изменения происходили так быстро, что никто не мог приспособиться.'],['Such was her talent that she was offered a scholarship.','Настолько велик был её талант, что ей предложили стипендию.']],
links:[['So/Such inversion','https://learnenglish.britishcouncil.org/grammar/c1-grammar/inversion',EN],['native-english.ru: инверсия','https://www.native-english.ru/grammar/inversion',RU]]},
]},

{name:'Модальность в академическом тексте',rules:[
{id:'c2_05',text:'Хеджинг: appear to, seem to, tend to, be likely to',note:'Prices appear to be rising. This tends to occur when...',
exp:`Хеджинг (hedging) — намеренное смягчение утверждений для выражения научной скромности.
<br><br>Основные конструкции:
<br>• <em>appear/seem to</em> — по всей видимости
<br>• <em>tend to</em> — как правило, имеют тенденцию
<br>• <em>be likely/unlikely to</em> — вероятно/маловероятно
<br>• <em>be thought/considered to be</em> — считается, что`,
ex:[['The results appear to suggest a correlation.','Результаты, по всей видимости, указывают на корреляцию.'],['Companies tend to underestimate implementation costs.','Компании, как правило, недооценивают затраты на внедрение.']],
links:[['Hedging in academic writing','https://learnenglish.britishcouncil.org/grammar/c1-grammar/hedging',EN],['native-english.ru: наречия','https://www.native-english.ru/grammar/english-adverbs',RU]]},

{id:'c2_06',text:'Дискурсивные маркеры в академическом тексте',note:'Furthermore, Nevertheless, Conversely, In light of, With regard to',
exp:`Маркеры структурируют и связывают академический текст:
<br><br>• <strong>Добавление</strong>: Moreover, Furthermore, In addition, Additionally
<br>• <strong>Контраст</strong>: However, Nevertheless, Nonetheless, Conversely, On the other hand
<br>• <strong>Результат</strong>: Therefore, Consequently, As a result, Hence, Thus
<br>• <strong>Пояснение</strong>: In other words, That is to say, Namely
<br>• <strong>Уступка</strong>: Admittedly, While it is true that, Despite this`,
ex:[['The experiment failed. Nevertheless, the findings were instructive.','Эксперимент не удался. Тем не менее результаты были поучительными.'],['Furthermore, the data suggests a strong correlation.','Более того, данные свидетельствуют о сильной корреляции.']],
links:[['Discourse markers','https://learnenglish.britishcouncil.org/grammar/b2-c1-grammar/discourse-markers',EN],['native-english.ru: союзы','https://www.native-english.ru/grammar/english-conjunctions',RU]]},
]},

{name:'Регистры и лексическая точность',rules:[
{id:'c2_07',text:'Регистры речи: формальный, нейтральный, разговорный',note:'I would like to enquire... vs I\'d like to ask... vs Can I ask...',
exp:`Регистр определяется целью, аудиторией и контекстом.
<br><br><strong>Формальный</strong>: пассив, номинализация, сложные союзы, полные формы, глаголы латинского происхождения (<em>commence, terminate, assist</em>).
<br><strong>Нейтральный</strong>: стандартная грамматика, без сленга, умеренные сокращения.
<br><strong>Неформальный</strong>: эллипсис, фразовые глаголы (<em>put off = postpone</em>), сокращения, разговорные выражения.`,
ex:[['Formal: I wish to draw your attention to a discrepancy.',''],['Neutral: I want to point out a mistake.',''],['Informal: Just wanted to flag something up.','']],
links:[['Register in English','https://learnenglish.britishcouncil.org/grammar/c1-grammar',EN],['native-english.ru: порядок слов','https://www.native-english.ru/grammar/word-order',RU]]},

{id:'c2_08',text:'Коннотации синонимов — оттенки значения',note:'thin/slim/slender/skinny/gaunt: позитивное→нейтральное→негативное',
exp:`Синонимы различаются коннотацией (эмоциональной окраской) и регистром.
<br><br>Примеры шкал:
<br>• <em>slim</em> (+) → <em>thin</em> (0) → <em>skinny</em> (-) → <em>scrawny/gaunt</em> (--)
<br>• <em>determined</em> (+) → <em>firm</em> (0) → <em>stubborn/pig-headed</em> (-)
<br>• <em>thrifty</em> (+) → <em>economical</em> (0) → <em>stingy/tight-fisted</em> (-)
<br>• <em>confident</em> (+) → <em>assertive</em> (0) → <em>arrogant</em> (-)`,
ex:[['She is slim. (+) / She is thin. (0) / She is skinny. (-)','Одно и то же — но разное отношение.']],
links:[['Word connotations','https://www.bbc.co.uk/learningenglish/english/features/vocabulary',EN],['native-english.ru: прилагательные','https://www.native-english.ru/grammar/english-adjectives',RU]]},

{id:'c2_09',text:'Риторические приёмы: анафора, хиазм, триколон',note:'"We shall fight on the beaches, we shall fight on the landing grounds..." — анафора',
exp:`<strong>Анафора</strong>: повторение слов в начале последовательных предложений. <em>"I have a dream... I have a dream..."</em>
<br><strong>Хиазм</strong>: перекрёстная структура AB-BA. <em>"Ask not what your country can do for you, but what you can do for your country."</em>
<br><strong>Триколон</strong>: три параллельных элемента. <em>"Veni, vidi, vici." / "Government of the people, by the people, for the people."</em>
<br><br>Эти приёмы используются в ораторских речах, эссе и публицистике.`,
ex:[['Friends, Romans, countrymen, lend me your ears. (триколон)',''],['The more you learn, the more you earn. (хиазм в народной мудрости)','']],
links:[['Rhetorical devices','https://www.bbc.co.uk/learningenglish',EN],['native-english.ru: восклицательные предложения','https://www.native-english.ru/grammar/exclamatory-sentences',RU]]},

{id:'c2_10',text:'Точные коллокации в академическом тексте',note:'conduct research, draw conclusions, reach a consensus, address an issue',
exp:`На C2 важно использовать «правильный» глагол с каждым существительным.
<br><br>Академические коллокации:
<br>• <em>conduct/carry out</em> research (не ~~make/do~~)
<br>• <em>draw/reach</em> a conclusion
<br>• <em>raise/address/tackle</em> an issue
<br>• <em>reach/achieve</em> a consensus
<br>• <em>make</em> significant progress
<br>• <em>pose/present</em> a challenge`,
ex:[['Researchers conducted extensive interviews.','Исследователи провели обширные интервью.'],['The committee failed to reach a consensus.','Комитету не удалось прийти к консенсусу.']],
links:[['Academic collocations','https://learnenglish.britishcouncil.org/grammar/c1-grammar',EN],['native-english.ru: существительное','https://www.native-english.ru/grammar/english-nouns',RU]]},
]},

{name:'Абсолютные конструкции',rules:[
{id:'c2_11',text:'Абсолютная конструкция с причастием',note:'Weather permitting, we\'ll have a picnic. Her eyes filled with tears, she left the room.',
exp:`Абсолютная конструкция = существительное/местоимение + причастие (независимое подлежащее).
<br>Используется в письменном и формальном стиле — добавляет обстоятельство без союза.
<br><br>Типы:
<br>• <em>Weather permitting</em> = If the weather permits
<br>• <em>All things considered</em> = If you consider everything
<br>• <em>Her work finished</em> = When/After her work was finished
<br>• <em>This done</em> = When/After this was done`,
ex:[['All things considered, it was a successful event.','Если всё взвесить, это было успешное мероприятие.'],['The deadline having passed, the project was cancelled.','После того как дедлайн прошёл, проект был отменён.']],
links:[['Absolute clauses','https://learnenglish.britishcouncil.org/grammar/c1-grammar/participle-clauses',EN],['native-english.ru: причастие','https://www.native-english.ru/grammar/participle',RU]]},
]},

{name:'Эллипсис и грамматические сокращения',rules:[
{id:'c2_12',text:'Эллипсис и замещение в связном тексте',note:'I wanted to go but didn\'t (want to). She said she\'d call and she did.',
exp:`Эллипсис — пропуск уже известных элементов.
<br>Замещение — использование <em>do/so/one/it</em> вместо повтора.
<br><br>Типы эллипсиса:
<br>• <em>A: Are you coming? B: Might (do).</em>
<br>• <em>She speaks French and he does too / so does he.</em>
<br>• <em>I wanted to leave, but wasn't allowed to.</em> (опущено <em>leave</em>)
<br><br>Замещение: <em>I thought he'd pass. He did.</em> / <em>The big one? I prefer the small one.</em>`,
ex:[["Can you drive? — I used to (drive).",'Ты умеешь водить? — Раньше умел.'],["She said she'd be here and she was.",'Она сказала, что придёт, и пришла.']],
links:[['Ellipsis and substitution','https://learnenglish.britishcouncil.org/grammar/c1-grammar/ellipsis-and-substitution',EN],['native-english.ru: сложноподчинённые','https://www.native-english.ru/grammar/complex-sentences',RU]]},

{id:'c2_13',text:'Инфинитивные обороты вместо придаточных',note:'I want you to explain. She asked me to help. He seems to be happy.',
exp:`Сложный инфинитив (Complex Object) заменяет придаточное:
<br><em>I want + object + to-infinitive</em>: <em>I want her to stay.</em>
<br><br>После <em>see, hear, watch, let, make, have</em> — инфинитив без <em>to</em>:
<br><em>I saw her leave. / She made him cry. / Let me help.</em>
<br>В пассиве — с <em>to</em>: <em>He was made to pay.</em>
<br><br>Конструкции с <em>seem, appear, happen, prove + to-inf</em>:
<br><em>She seems to know. / He happened to be there.</em>`,
ex:[['I need you to sign this document.','Мне нужно, чтобы ты подписал этот документ.'],['She was made to apologise publicly.','Её заставили публично извиниться.'],['He seemed to have forgotten everything.','Казалось, он забыл всё.']],
links:[['Complex object','https://www.perfect-english-grammar.com/infinitives.html',EN],['native-english.ru: инфинитив','https://www.native-english.ru/grammar/infinitive',RU]]},
]},

{name:'Future Perfect Continuous и согласование времён',rules:[
{id:'c2_14',text:'Future Perfect Continuous: will have been + V-ing',note:'By next year, I will have been studying English for five years.',
exp:`<strong>Future Perfect Continuous</strong> = <em>will have been + V-ing</em>\n<br><br>Акцент на продолжительности действия, которое будет длиться вплоть до определённого момента в будущем. Часто отвечает на вопрос «Как долго к тому времени?»\n<br><br>Часто используется с <em>by (the time), for, when</em>: <em>By Monday, she will have been working on this project for three weeks.</em>`,
ex:[['By next year, I will have been learning English for five years.','К следующему году я буду изучать английский уже пять лет.'],['When we arrive, she will have been waiting for two hours.','Когда мы приедем, она уже будет ждать два часа.']],
links:[['native-english.ru: Future Perfect Continuous','https://www.native-english.ru/grammar/future-perfect-continuous',RU],['Future Perfect Continuous','https://www.perfect-english-grammar.com/future-perfect-continuous.html',EN]]},

{id:'c2_15',text:'Согласование времён — sequence of tenses',note:'She said she had been working. He thought it would be difficult.',
exp:`В сложноподчинённых предложениях глагол придаточного согласуется по времени с главным.\n<br><br>Если главный глагол в прошлом:\n<br>• Present Simple → Past Simple: <em>he said it was true</em>\n<br>• Past Simple → Past Perfect: <em>she said she had seen it</em>\n<br>• Present Perfect → Past Perfect: <em>he said he had finished</em>\n<br>• will → would; can → could; may → might; is → was\n<br><br>⚠️ Исключение: общие истины и научные факты не изменяются: <em>She said that water boils at 100°C.</em>`,
ex:[['He told me that he had been living there for years.','Он сказал мне, что жил там уже много лет.'],['She said the Earth moves around the Sun. (общая истина — не меняем)','Она сказала, что Земля движется вокруг Солнца.']],
links:[['native-english.ru: согласование времён','https://www.native-english.ru/grammar/sequence-of-tenses',RU]]},
]},

{name:'Союзы и связность текста',rules:[
{id:'c2_16',text:'Сочинительные союзы: and, but, or, nor, for, yet, so',note:'FANBOYS: For, And, Nor, But, Or, Yet, So',
exp:`Сочинительные союзы соединяют равнозначные части предложения.\n<br><br>Семь основных (акроним FANBOYS):\n<br>• <em>for</em> = потому что (формальный): <em>She left, for she was tired.</em>\n<br>• <em>and</em> = и (добавление)\n<br>• <em>nor</em> = и не (Neither/Nor... инверсия!): <em>She didn't call, nor did she write.</em>\n<br>• <em>but</em> = но (контраст)\n<br>• <em>or</em> = или (альтернатива)\n<br>• <em>yet</em> = однако (контраст, формальнее but)\n<br>• <em>so</em> = поэтому (следствие)`,
ex:[['She was tired, yet she kept working.','Она устала, однако продолжала работать.'],['He didn\'t study, nor did he attend class.','Он не учился и не ходил на занятия.']],
links:[['native-english.ru: сочинительные союзы','https://www.native-english.ru/grammar/coordinating-conjunctions',RU]]},

{id:'c2_17',text:'Подчинительные союзы: although, whereas, provided, unless...',note:'although, as though, whereas, provided that, unless, given that, in case',
exp:`Подчинительные союзы вводят придаточные предложения.\n<br><br>По значению:\n<br>• <strong>Времени</strong>: <em>when, while, as, after, before, until, once, as soon as, whenever</em>\n<br>• <strong>Причины</strong>: <em>because, since, as, given that, seeing that</em>\n<br>• <strong>Условия</strong>: <em>if, unless, provided, as long as, in case, supposing</em>\n<br>• <strong>Цели</strong>: <em>so that, in order that, lest</em>\n<br>• <strong>Уступки</strong>: <em>although, even though, whereas, while, however</em>`,
ex:[['Seeing that the deadline had passed, we cancelled the meeting.','Поскольку дедлайн прошёл, мы отменили встречу.'],['Lest she forget, he sent her a reminder.','Чтобы она не забыла, он отправил ей напоминание.']],
links:[['native-english.ru: подчинительные союзы','https://www.native-english.ru/grammar/subordinating-conjunctions',RU]]},
]},

{name:'Пунктуация в академическом тексте',rules:[
{id:'c2_18',text:'Запятая, точка с запятой и двоеточие',note:'Use a comma before FANBOYS. Use a semicolon to link related clauses.',
exp:`<strong>Запятая</strong>:\n<br>• Перед сочинительными союзами FANBOYS между самостоятельными предложениями.\n<br>• После вводных слов/оборотов: <em>However, she decided to stay.</em>\n<br>• В перечислениях (Oxford comma — перед последним and): <em>apples, oranges, and bananas</em>.\n<br><br><strong>Точка с запятой (;)</strong>: связывает два самостоятельных предложения без союза.\n<br><em>She was tired; she went to bed.</em>\n<br><br><strong>Двоеточие (:)</strong>: вводит список, пояснение, цитату.`,
ex:[['However, the results were inconclusive; further research is required.','Однако результаты неоднозначны; требуются дальнейшие исследования.'],['The company has three priorities: efficiency, innovation, and sustainability.','У компании три приоритета: эффективность, инновации и устойчивость.']],
links:[['native-english.ru: пунктуация','https://www.native-english.ru/grammar/english-punctuation',RU]]},

{id:'c2_19',text:'Тире, апостроф и кавычки',note:'Em dash — for emphasis — sets off a phrase. It\'s vs its. "Direct speech"',
exp:`<strong>Тире (—)</strong>: выделяет вставную конструкцию (сильнее запятой): <em>The solution — though expensive — proved effective.</em>\n<br><br><strong>Апостроф</strong>:\n<br>• Сокращения: <em>it's = it is; don't; they're</em>\n<br>• Притяжательный падеж: <em>John's book; the students' results</em>\n<br>• ⚠️ <em>its</em> (принадлежность) vs <em>it's</em> (it is)\n<br><br><strong>Кавычки</strong>: AmE — двойные ("<em>text</em>"), BrE — одинарные ('<em>text</em>').`,
ex:[['The project — launched in 2020 — exceeded all expectations.','Проект, запущенный в 2020 году, превзошёл все ожидания.'],["It's important to check its settings before use.",'Важно проверить его настройки перед использованием.']],
links:[['native-english.ru: пунктуация','https://www.native-english.ru/grammar/english-punctuation',RU]]},

{id:'c2_20',text:'Специальные и косвенные вопросы в академическом тексте',note:'The question is whether... / I wonder what the data shows.',
exp:`В академическом тексте прямые вопросы заменяются косвенными (вопросительными придаточными).\n<br><br>Косвенный вопрос — это придаточное с обычным порядком слов (без инверсии, без do).\n<br><br>Вводящие слова: <em>whether, if (да/нет), what, where, when, how, why, which</em>.\n<br><br>Пример: <em>What does this data show?</em> → <em>The question is what this data shows.</em>`,
ex:[['I wonder whether the hypothesis is correct.','Интересно, верна ли гипотеза.'],['The study examines how social media affects behaviour.','Исследование изучает, как социальные сети влияют на поведение.']],
links:[['native-english.ru: специальные вопросы','https://www.native-english.ru/grammar/special-questions',RU]]},
]}
]}
];

var SK='eng_v4';

  a1_02:['~~I amn\'t tired~~ → I\'m <em>not</em> tired (amn\'t не существует!)','~~He don\'t tired~~ → He <em>isn\'t</em> tired','~~She is not = shes not~~ — только <em>she\'s not</em> или <em>she isn\'t</em>'],

  a1_06:['~~I like the music~~ → I like music (общий смысл — без артикля)','~~The life is short~~ → Life is short','~~He is the doctor~~ → He is <em>a</em> doctor (первое упоминание)'],
  a1_07:['~~I play the tennis~~ → I play tennis','~~She speaks the Spanish~~ → She speaks Spanish','~~the Russia~~ → Russia (страны без артикля, кроме The USA, The UK)'],

/* ── Particle burst ── */
function spawnParticles(chkEl, color){
  var rect = chkEl.getBoundingClientRect();
  var cx = rect.left + rect.width/2;
  var cy = rect.top + rect.height/2;
  var canvas = document.createElement('canvas');
  canvas.className = 'particle-canvas';
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  canvas.style.left = '0';
  canvas.style.top = '0';
  canvas.style.width = '100vw';
  canvas.style.height = '100vh';
  document.body.appendChild(canvas);
  var ctx = canvas.getContext('2d');
  var particles = [];
  var count = 14;
  // resolve CSS variable to hex
  var resolvedColor = color;
  if(color && color.startsWith('var(--')){
    var varName = color.slice(4,-1);
    resolvedColor = getComputedStyle(document.documentElement).getPropertyValue(varName).trim() || '#4ade80';
  }
  for(var i=0;i<count;i++){
    var angle = (Math.PI*2/count)*i + (Math.random()-0.5)*0.4;
    var speed = 2.5 + Math.random()*3.5;
    var size = 3 + Math.random()*3;
    var shapes = ['circle','square','star'];
    particles.push({
      x:cx, y:cy,
      vx: Math.cos(angle)*speed,
      vy: Math.sin(angle)*speed - 1.5,
      ax:0, ay:0.18,
      alpha:1, size:size,
      color: resolvedColor,
      shape: shapes[i%3],
      rot: Math.random()*Math.PI*2,
      rotV: (Math.random()-0.5)*0.3
    });
  }
  var start = null;
  function frame(ts){
    if(!start)start=ts;
    var elapsed=(ts-start)/1000;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    var alive=false;
    particles.forEach(function(p){
      p.vx+=p.ax; p.vy+=p.ay;
      p.x+=p.vx; p.y+=p.vy;
      p.alpha=Math.max(0,1-elapsed/0.7);
      p.rot+=p.rotV;
      if(p.alpha>0){alive=true;}
      ctx.save();
      ctx.globalAlpha=p.alpha;
      ctx.fillStyle=p.color;
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot);
      if(p.shape==='circle'){
        ctx.beginPath();ctx.arc(0,0,p.size/2,0,Math.PI*2);ctx.fill();
      } else if(p.shape==='square'){
        ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);
      } else {
        // star
        ctx.beginPath();
        for(var j=0;j<5;j++){
          var a=j*Math.PI*2/5-Math.PI/2;
          var ai=a+Math.PI/5;
          ctx.lineTo(Math.cos(a)*p.size,Math.sin(a)*p.size);
          ctx.lineTo(Math.cos(ai)*p.size*0.45,Math.sin(ai)*p.size*0.45);
        }
        ctx.closePath();ctx.fill();
      }
      ctx.restore();
    });
    if(alive) requestAnimationFrame(frame);
    else canvas.remove();
  }
  requestAnimationFrame(frame);
}

var SVG_CHK = '<svg class="chk-svg" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 9.5L7.5 13L14 6" stroke="#000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';

function toggleRule(id,e){
  if(e){e.stopPropagation();e.preventDefault();}
  done[id]=!done[id]; saveD(done);
  var el=document.getElementById('ri-'+id); if(!el)return;
  var chk=el.querySelector('.rule-check');
  var lvlKey=id.split('_')[0];
  var lvl=DATA.find(function(l){return l.id.toLowerCase()===lvlKey;});
  var color = lvl ? lvl.color : 'var(--a1)';

  if(done[id]){
    // apply color
    if(lvl){chk.style.background=color; chk.style.borderColor=color; chk.style.color='#000';}
    // inject SVG checkmark (no text)
    chk.textContent='';
    chk.insertAdjacentHTML('beforeend', SVG_CHK);
    // trigger checkmark draw + pulse
    requestAnimationFrame(function(){
      chk.classList.add('anim-check');
    });
    // rule glow slide
    el.classList.remove('celebrate-enter');
    el.classList.add('done');
    requestAnimationFrame(function(){
      el.classList.add('celebrate-enter');
      setTimeout(function(){el.classList.remove('celebrate-enter');},900);
    });
    // particles
    spawnParticles(chk, color);
  } else {
    el.classList.remove('done','celebrate-enter');
    // uncheck wiggle
    el.classList.add('uncheck-anim');
    setTimeout(function(){el.classList.remove('uncheck-anim');},350);
    chk.innerHTML='';
    chk.style.background=''; chk.style.borderColor='var(--border2)'; chk.style.color='';
  }
  updLvl(lvlKey); updAll();
}

function toggleExp(id,rule,e){
  if(e)e.stopPropagation();
  var el=document.getElementById('exp-'+id);if(!el)return;
  var arr=document.getElementById('arr-'+id);

  if(el.classList.contains('open')){
    // Close: slide up
    el.style.maxHeight=el.scrollHeight+30+'px';
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        el.style.transition='max-height 0.32s cubic-bezier(0.4,0,0.6,1), opacity 0.2s ease, padding 0.25s ease';
        el.style.maxHeight='0';

        el.style.padding='0 13px';
      });

    el.classList.add('open');

    el.style.maxHeight=el.scrollHeight+30+'px';

      }
    });
    if(arr){arr.classList.add('open');}
  }
}

function toggleLevel(k){
  var b=document.getElementById('level-'+k);
  if(!b)return;
  var content=b.querySelector('.level-content');
  if(!content)return;

  if(b.classList.contains('open')){
    // Close: slide up (bottom to top) — shrink from current height to 0
    content.style.maxHeight=content.scrollHeight+'px';
    content.style.opacity='1';
    requestAnimationFrame(function(){
      requestAnimationFrame(function(){
        content.style.transition='max-height 0.38s cubic-bezier(0.4,0,0.6,1), opacity 0.25s ease';
        content.style.maxHeight='0';
        content.style.opacity='0';
      });
    });
    b.classList.remove('open');
  } else {
    // Open: slide down (top to bottom) — expand from 0 to full height
    b.classList.add('open');
    content.style.transition='max-height 0.46s cubic-bezier(0.22,1,0.36,1), opacity 0.3s ease';
    content.style.maxHeight=content.scrollHeight+'px';
    content.style.opacity='1';
    content.addEventListener('transitionend',function h(e){
      if(e.propertyName==='max-height'){
        content.style.maxHeight='none'; // allow dynamic resizing
        content.removeEventListener('transitionend',h);
      }
    });
    // stagger rules and categories
    var rules=b.querySelectorAll('.rules-grid .rule-item');
    rules.forEach(function(r,i){r.style.animationDelay=(0.05+i*0.028)+'s';});

function getRuleById(id){
  for(var i=0;i<DATA.length;i++){
    var lvl=DATA[i];
    for(var j=0;j<lvl.categories.length;j++){
      var cat=lvl.categories[j];
      for(var k=0;k<cat.rules.length;k++){
        if(cat.rules[k].id===id) return {rule:cat.rules[k],level:lvl,category:cat};
      }
    }
  }
  return null;
}

  if(e)e.stopPropagation();
  var found=getRuleById(ruleId);
  if(!found)return;
  var r=found.rule;
  var levelName=found.level.name;
  var catName=found.category.name;

  var prompt='Я изучаю английскую грамматику (уровень '+levelName+', тема «'+catName+'»).\n\n';
  prompt+='Правило: «'+r.text+'»\n';
  if(r.note) prompt+='Подсказка: '+r.note+'\n';
  prompt+='\nПожалуйста, проведи углублённое тестирование этого правила:\n';
  prompt+='1. Объясни правило кратко своими словами (2–3 предложения).\n';
  prompt+='2. Дай 5 упражнений на заполнение пропусков (gaps).\n';
  prompt+='3. Дай 3 предложения с ошибками для исправления.\n';
  prompt+='4. Задай 2 вопроса на перевод с русского на английский.\n';
  prompt+='5. После того как я отвечу — проверь ответы и дай подробную обратную связь.';

  navigator.clipboard.writeText(prompt).then(function(){
    showCopiedToast(btn);
  }).catch(function(){
    var ta=document.createElement('textarea');
    ta.value=prompt;ta.style.position='fixed';ta.style.opacity='0';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');
    document.body.removeChild(ta);
    showCopiedToast(btn);
  });
}

function globalTestPrompt(){
  var btn=document.getElementById('global-test-btn');
  var doneRules=[];
  DATA.forEach(function(lvl){
    lvl.categories.forEach(function(cat){
      cat.rules.forEach(function(r){
        if(done[r.id]) doneRules.push({rule:r,level:lvl,category:cat});
      });
    });
  });

  if(doneRules.length===0){
    alert('Сначала отметь хотя бы одно правило как изученное!');
    return;
  }

  var ruleList=doneRules.map(function(item,idx){
    return (idx+1)+'. ['+item.level.id+' — '+item.category.name+'] '+item.rule.text;
  }).join('\n');

  var prompt='Я изучил(а) следующие правила английской грамматики:\n\n';
