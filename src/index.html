ex:[['I recommend that he see a doctor.','Я рекомендую ему обратиться к врачу.'],['It is essential that all students attend the meeting.','Крайне важно, чтобы все студенты присутствовали на собрании.']],
links:[['Subjunctive','https://www.perfect-english-grammar.com/subjunctive.html',EN],['British Council: subjunctive','https://learnenglish.britishcouncil.org/grammar/c1-grammar/subjunctive',EN]]},

{id:'c1_08',text:'It\'s high time + Past Simple',note:'It\'s high time you went to bed. It\'s time we left.',
exp:`<em>It's (high/about) time + подлежащее + Past Simple</em>
<br>Значение: настоящее/будущее — говорим о том, что давно нужно было сделать.
<br><em>high time</em> — ещё сильнее: уже давно пора!`,
ex:[["It's time she found a new job.",'Ей давно пора найти новую работу.'],["It's high time you apologised.",'Уже давно пора извиниться.']],
links:[['It\'s time','https://www.perfect-english-grammar.com/subjunctive.html',EN]]},

{id:'c1_09',text:'as if / as though + сослагательное',note:'She talks as if she knew everything. He looked as though he had seen a ghost.',
exp:`<em>as if / as though + Past Simple</em> — нереальное сравнение в настоящем.
<br><em>as if / as though + Past Perfect</em> — нереальное сравнение о прошлом.`,
ex:[['He spends money as if he were a millionaire.','Он тратит деньги, как будто он миллионер.'],['She spoke as though she had met him before.','Она говорила так, как будто уже встречала его раньше.']],
links:[['As if / as though','https://www.perfect-english-grammar.com/subjunctive.html',EN]]},
]},

{name:'Эллипсис и замещение',rules:[
{id:'c1_10',text:'So / Neither + вспомогательный глагол + подлежащее',note:'So do I. Neither does she. So am I.',
exp:`<em>So + вспомогательный + подлежащее</em> — согласие с утвердительным.
<br><em>Neither/Nor + вспомогательный + подлежащее</em> — согласие с отрицательным.
<br>Вспомогательный глагол должен совпадать со временем исходного предложения.`,
ex:[["I love jazz. So does she.",'Я люблю джаз. Она тоже.'],["I haven't been to Rome. Neither have I.",'Я не был в Риме. Я тоже.']],
links:[['So / Neither','https://www.perfect-english-grammar.com/so-neither.html',EN]]},

{id:'c1_11',text:'I think so / I hope so / I\'m afraid so',note:'Will it rain? — I think so. / I hope not.',
exp:`<em>so</em> заменяет придаточное предложение после: <em>think, hope, suppose, expect, believe, imagine, be afraid</em>.
<br>Отрицательная форма: <em>not</em> (не <em>so not</em>!).`,
ex:[["Will he come? — I think so. / I don't think so.",'Он придёт? — Думаю, да. / Не думаю.'],['Is it expensive? — I\'m afraid so.','Это дорого? — Боюсь, что да.'],['Is it closed? — I hope not.','Закрыто? — Надеюсь, что нет.']],
links:[['I think so / I hope so','https://www.perfect-english-grammar.com/so-not.html',EN]]},
]},

{name:'Придаточные — продвинутый',rules:[
{id:'c1_12',text:'Включающие vs невключающие придаточные',note:'The man who called is my brother. VS My brother, who called, is a doctor.',
exp:`<strong>Включающее (defining)</strong>: уточняет, о ком/чём речь — без запятых. <em>that</em> можно. Местоимение можно опустить если оно дополнение.
<br><br><strong>Невключающее (non-defining)</strong>: добавляет информацию — обязательны запятые. Только <em>who/which</em> (не <em>that</em>!). Местоимение нельзя опускать.`,
ex:[['The film that won the Oscar was brilliant. (определяет, о каком фильме речь)','Фильм, который выиграл Оскар, был великолепен.'],['Avatar, which came out in 2009, was a huge hit. (доп. факт о и так известном фильме)','Аватар, вышедший в 2009, стал большим хитом.']],
links:[['Defining vs non-defining','https://www.perfect-english-grammar.com/defining-and-non-defining-relative-clauses.html',EN],['British Council','https://learnenglish.britishcouncil.org/grammar/c1-grammar/relative-clauses-advanced',EN]]},

{id:'c1_13',text:'Предлог + which/whom в формальном стиле',note:'The company for which I work. The person with whom I spoke.',
exp:`Формальный стиль: <em>предлог + which/whom</em> перед относительным местоимением.
<br>Неформальный эквивалент: предлог в конец предложения.
<br><em>whom</em> — формальная объектная форма <em>who</em>.`,
ex:[['The report to which I referred is attached. (формально)','Упомянутый мной отчёт прилагается.'],['The report which I referred to is attached. (нейтрально)',''],['The report I referred to is attached. (разговорно)','']],
links:[['Relative clauses advanced','https://learnenglish.britishcouncil.org/grammar/c1-grammar/relative-clauses-advanced',EN]]},
]},

{name:'Номинализация',rules:[
{id:'c1_14',text:'Номинализация — основы',note:'decide→decision, discover→discovery, improve→improvement',
exp:`Номинализация — преобразование глаголов/прилагательных в существительные. Признак академического и делового стиля.
<br><br>Основные суффиксы:
<br>• <em>-tion/-sion</em>: decide→decision, discuss→discussion
<br>• <em>-ment</em>: improve→improvement, develop→development
<br>• <em>-ance/-ence</em>: appear→appearance, differ→difference
<br>• <em>-ity</em>: complex→complexity, able→ability
<br>• <em>-ness</em>: happy→happiness, aware→awareness`,
ex:[['She decided to expand. → Our decision to expand the company...','Наше решение о расширении...'],['He discovered that... → His discovery of the error...','Его открытие ошибки...']],
links:[['Nominalisation','https://learnenglish.britishcouncil.org/grammar/c1-grammar/nominalisation',EN]]},

{id:'c1_15',text:'Номинализация в академическом тексте',note:'The fact that prices increased → The increase in prices...',
exp:`Номинализация позволяет:
<br>1. Сжать информацию: <em>There was a significant increase in prices.</em>
<br>2. Добавить определения: <em>The rapid increase in house prices...</em>
<br>3. Создать формальный, безличный тон.`,
ex:[['There has been a significant improvement in air quality.','Качество воздуха значительно улучшилось.'],['His refusal to comment surprised everyone.','Его отказ комментировать удивил всех.']],
links:[['Academic writing nominalisation','https://learnenglish.britishcouncil.org/grammar/c1-grammar/nominalisation',EN]]},
]}
]},

{id:'C2',name:'C2 — Мастерство',sub:'Proficiency · 1–2+ года',color:'var(--c2)',colorBg:'var(--c2bg)',
categories:[
{name:'Условные — полная система',rules:[
{id:'c2_01',text:'Условные с unless / provided / as long as / on condition that',note:'Unless you study, you\'ll fail. As long as you\'re honest, I\'ll help.',
exp:`<em>unless</em> = if not (но нельзя использовать с отрицанием!): <em>Unless you hurry</em> = <em>If you don't hurry</em>
<br><em>provided/providing (that)</em> = if and only if (строгое условие)
<br><em>as long as</em> = при условии, что (допущение)
<br><em>on condition that</em> = на условии, что (формально)
<br><em>in case</em> = на случай, если`,
ex:[["I'll lend you money, as long as you pay me back.",'Я одолжу тебе деньги, при условии что ты вернёшь.'],["You can use my laptop, provided you don't download anything.",'Можешь использовать мой ноутбук, при условии что ничего не скачаешь.']],
links:[['Advanced conditionals','https://www.perfect-english-grammar.com/conditionals-advanced.html',EN]]},

{id:'c2_02',text:'Suppose / supposing / what if',note:'Suppose you won the lottery — what would you do?',
exp:`<em>Suppose/Supposing</em> — используются как <em>if</em> в гипотетических вопросах.
<br><em>What if</em> — неформальный аналог.
<br><br>С Past Simple — ситуация маловероятная или воображаемая.`,
ex:[['Supposing you had to choose — which would you pick?','Представь, что тебе нужно выбрать — что бы ты выбрал?'],['What if nobody comes? What should we do?','А вдруг никто не придёт? Что нам делать?']],
links:[['Suppose/supposing','https://www.perfect-english-grammar.com/conditionals-advanced.html',EN]]},
]},

{name:'Инверсия — полная система',rules:[
{id:'c2_03',text:'Only + обстоятельство + инверсия',note:'Only when I left did I realise. Only then did he understand.',
exp:`<em>Only + when/after/if/then/by/in/on</em> — вся группа выносится в начало → инверсия.
<br><br>Это один из самых мощных риторических приёмов в письменной и ораторской речи.`,
ex:[['Only when you experience it can you truly understand.','Только пережив это, можно по-настоящему понять.'],['Only after years of practice did she master the skill.','Лишь после многих лет практики она овладела навыком.']],
links:[['Advanced inversion','https://learnenglish.britishcouncil.org/grammar/c1-grammar/inversion',EN]]},

{id:'c2_04',text:'So + прилагательное/наречие + инверсия',note:'So great was his relief that he wept. Such was her talent...',
exp:`Книжный и ораторский стиль.
<br><em>So + adj/adv + be/aux + подлежащее</em>
<br><em>Such + was/were + подлежащее</em>`,
ex:[['So rapid was the change that nobody could adapt.','Изменения происходили так быстро, что никто не мог приспособиться.'],['Such was her talent that she was offered a scholarship.','Настолько велик был её талант, что ей предложили стипендию.']],
links:[['So/Such inversion','https://learnenglish.britishcouncil.org/grammar/c1-grammar/inversion',EN]]},
]},

{name:'Модальность в академическом тексте',rules:[
{id:'c2_05',text:'Хеджинг: appear to, seem to, tend to, be likely to',note:'Prices appear to be rising. This tends to occur when...',
exp:`Хеджинг (hedging) — намеренное смягчение утверждений для выражения научной скромности.
<br><br>Основные конструкции:
<br>• <em>appear/seem to</em> — по всей видимости
<br>• <em>tend to</em> — как правило, имеют тенденцию
<br>• <em>be likely/unlikely to</em> — вероятно/маловероятно
<br>• <em>be thought/considered to be</em> — считается, что`,
ex:[['The results appear to suggest a correlation.','Результаты, по всей видимости, указывают на корреляцию.'],['Companies tend to underestimate implementation costs.','Компании, как правило, недооценивают затраты на внедрение.']],
links:[['Hedging in academic writing','https://learnenglish.britishcouncil.org/grammar/c1-grammar/hedging',EN]]},

{id:'c2_06',text:'Дискурсивные маркеры в академическом тексте',note:'Furthermore, Nevertheless, Conversely, In light of, With regard to',
exp:`Маркеры структурируют и связывают академический текст:
<br><br>• <strong>Добавление</strong>: Moreover, Furthermore, In addition, Additionally
<br>• <strong>Контраст</strong>: However, Nevertheless, Nonetheless, Conversely, On the other hand
<br>• <strong>Результат</strong>: Therefore, Consequently, As a result, Hence, Thus
<br>• <strong>Пояснение</strong>: In other words, That is to say, Namely
<br>• <strong>Уступка</strong>: Admittedly, While it is true that, Despite this`,
ex:[['The experiment failed. Nevertheless, the findings were instructive.','Эксперимент не удался. Тем не менее результаты были поучительными.'],['Furthermore, the data suggests a strong correlation.','Более того, данные свидетельствуют о сильной корреляции.']],
links:[['Discourse markers','https://learnenglish.britishcouncil.org/grammar/b2-c1-grammar/discourse-markers',EN]]},
]},

{name:'Регистры и лексическая точность',rules:[
{id:'c2_07',text:'Регистры речи: формальный, нейтральный, разговорный',note:'I would like to enquire... vs I\'d like to ask... vs Can I ask...',
exp:`Регистр определяется целью, аудиторией и контекстом.
<br><br><strong>Формальный</strong>: пассив, номинализация, сложные союзы, полные формы, глаголы латинского происхождения (<em>commence, terminate, assist</em>).
<br><strong>Нейтральный</strong>: стандартная грамматика, без сленга, умеренные сокращения.
<br><strong>Неформальный</strong>: эллипсис, фразовые глаголы (<em>put off = postpone</em>), сокращения, разговорные выражения.`,
ex:[['Formal: I wish to draw your attention to a discrepancy.',''],['Neutral: I want to point out a mistake.',''],['Informal: Just wanted to flag something up.','']],
links:[['Register in English','https://learnenglish.britishcouncil.org/grammar/c1-grammar',EN]]},

{id:'c2_08',text:'Коннотации синонимов — оттенки значения',note:'thin/slim/slender/skinny/gaunt: позитивное→нейтральное→негативное',
exp:`Синонимы различаются коннотацией (эмоциональной окраской) и регистром.
<br><br>Примеры шкал:
<br>• <em>slim</em> (+) → <em>thin</em> (0) → <em>skinny</em> (-) → <em>scrawny/gaunt</em> (--)
<br>• <em>determined</em> (+) → <em>firm</em> (0) → <em>stubborn/pig-headed</em> (-)
<br>• <em>thrifty</em> (+) → <em>economical</em> (0) → <em>stingy/tight-fisted</em> (-)
<br>• <em>confident</em> (+) → <em>assertive</em> (0) → <em>arrogant</em> (-)`,
ex:[['She is slim. (+) / She is thin. (0) / She is skinny. (-)','Одно и то же — но разное отношение.']],
links:[['Word connotations','https://www.bbc.co.uk/learningenglish/english/features/vocabulary',EN]]},

{id:'c2_09',text:'Риторические приёмы: анафора, хиазм, триколон',note:'"We shall fight on the beaches, we shall fight on the landing grounds..." — анафора',
exp:`<strong>Анафора</strong>: повторение слов в начале последовательных предложений. <em>"I have a dream... I have a dream..."</em>
<br><strong>Хиазм</strong>: перекрёстная структура AB-BA. <em>"Ask not what your country can do for you, but what you can do for your country."</em>
<br><strong>Триколон</strong>: три параллельных элемента. <em>"Veni, vidi, vici." / "Government of the people, by the people, for the people."</em>
<br><br>Эти приёмы используются в ораторских речах, эссе и публицистике.`,
ex:[['Friends, Romans, countrymen, lend me your ears. (триколон)',''],['The more you learn, the more you earn. (хиазм в народной мудрости)','']],
links:[['Rhetorical devices','https://www.bbc.co.uk/learningenglish',EN]]},

{id:'c2_10',text:'Точные коллокации в академическом тексте',note:'conduct research, draw conclusions, reach a consensus, address an issue',
exp:`На C2 важно использовать «правильный» глагол с каждым существительным.
<br><br>Академические коллокации:
<br>• <em>conduct/carry out</em> research (не ~~make/do~~)
<br>• <em>draw/reach</em> a conclusion
<br>• <em>raise/address/tackle</em> an issue
<br>• <em>reach/achieve</em> a consensus
<br>• <em>make</em> significant progress
<br>• <em>pose/present</em> a challenge`,
ex:[['Researchers conducted extensive interviews.','Исследователи провели обширные интервью.'],['The committee failed to reach a consensus.','Комитету не удалось прийти к консенсусу.']],
links:[['Academic collocations','https://learnenglish.britishcouncil.org/grammar/c1-grammar',EN]]},
]}
]}
];

var SK='eng_v3';
function loadD(){try{return JSON.parse(localStorage.getItem(SK)||'{}')}catch(e){return{}}}
function saveD(d){localStorage.setItem(SK,JSON.stringify(d))}
var done=loadD();

function countL(lvl){var t=0,c=0;lvl.categories.forEach(function(cat){cat.rules.forEach(function(r){t++;if(done[r.id])c++;});});return{total:t,checked:c};}
function countAll(){var t=0,c=0;DATA.forEach(function(lvl){var x=countL(lvl);t+=x.total;c+=x.checked;});return{total:t,checked:c};}

function updAll(){
  var c=countAll();
  document.getElementById('total-done').textContent=c.checked;
  document.getElementById('total-all').textContent=c.total;
  var pct=c.total?Math.round(c.checked/c.total*100):0;
  document.getElementById('overall-bar').style.width=pct+'%';
  var row=document.getElementById('stats-row');
  var comp=DATA.filter(function(lvl){var x=countL(lvl);return x.checked===x.total&&x.total>0;});
  var html='<div class="stat-chip">Прогресс: <strong>'+pct+'%</strong></div>';
  html+='<div class="stat-chip">Осталось: <strong>'+(c.total-c.checked)+'</strong> правил</div>';
  if(comp.length)html+='<div class="stat-chip">✓ Завершены: <strong>'+comp.map(function(l){return l.id;}).join(', ')+'</strong></div>';
  row.innerHTML=html;
}

function updLvl(lvlKey){
  var lvl=DATA.find(function(l){return l.id.toLowerCase()===lvlKey;});
  if(!lvl)return;
  var c=countL(lvl);
  var pct=c.total?Math.round(c.checked/c.total*100):0;
  var f=document.getElementById('lf-'+lvlKey);var p=document.getElementById('lp-'+lvlKey);var b=document.getElementById('lb-'+lvlKey);
  if(f)f.textContent=c.checked+'/'+c.total;
  if(p)p.textContent=pct+'%';
  if(b)b.style.width=pct+'%';
}

function toggleRule(id){
  done[id]=!done[id];saveD(done);
  var el=document.getElementById('ri-'+id);if(!el)return;
  var chk=el.querySelector('.rule-check');
  var lvlKey=id.split('_')[0];
  var lvl=DATA.find(function(l){return l.id.toLowerCase()===lvlKey;});
  if(done[id]){
    el.classList.add('done','celebrate');
    setTimeout(function(){el.classList.remove('celebrate');},400);
    chk.textContent='✓';
    if(lvl){chk.style.background=lvl.color;chk.style.borderColor=lvl.color;chk.style.color='#000';}
  }else{
    el.classList.remove('done');
    chk.textContent='';chk.style.background='';chk.style.borderColor='var(--border2)';chk.style.color='';
  }
  updLvl(lvlKey);updAll();
}

function toggleExp(id,btn,e){
  if(e)e.stopPropagation();
  var el=document.getElementById('exp-'+id);if(!el)return;
  var open=el.classList.toggle('open');
  btn.classList.toggle('open',open);
  btn.textContent=open?'▲ скрыть':'ℹ info';
}

function toggleLevel(k){var b=document.getElementById('level-'+k);if(b)b.classList.toggle('open');}

function doSearch(val){
  var v=val.trim().toLowerCase();
  var any=false;
  DATA.forEach(function(lvl){
    lvl.categories.forEach(function(cat){
      cat.rules.forEach(function(r){
        var el=document.getElementById('ri-'+r.id);if(!el)return;
        if(!v){el.classList.remove('hidden-search');any=true;return;}
        var match=(r.text+' '+(r.note||'')+' '+(r.exp||'')).toLowerCase().indexOf(v)>=0;
        el.classList.toggle('hidden-search',!match);
        if(match){any=true;var b=document.getElementById('level-'+r.id.split('_')[0]);if(b&&!b.classList.contains('open'))b.classList.add('open');}
      });
    });
  });
  document.getElementById('no-results').style.display=any?'none':'block';
}

function renderAll(){
  var path=document.getElementById('level-path');path.innerHTML='';
  DATA.forEach(function(lvl,idx){
    var c=countL(lvl);var pct=c.total?Math.round(c.checked/c.total*100):0;
    var k=lvl.id.toLowerCase();
    var block=document.createElement('div');
    block.className='level-block'+(idx===0?' open':'');
    block.id='level-'+k;

    var hh='<div class="level-header" onclick="toggleLevel(\''+k+'\')">';
    hh+='<div class="level-dot" style="color:'+lvl.color+';border-color:'+lvl.color+';background:'+lvl.colorBg+'">'+lvl.id+'</div>';
    hh+='<div class="level-info"><div class="level-name">'+lvl.name+'</div><div class="level-sub">'+lvl.sub+'</div></div>';
    hh+='<div class="level-stats"><div class="level-frac" id="lf-'+k+'" style="color:'+lvl.color+'">'+c.checked+'/'+c.total+'</div><div class="level-pct" id="lp-'+k+'">'+pct+'%</div></div>';
    hh+='<div class="level-toggle">▾</div></div>';
    hh+='<div class="level-progress-bar"><div class="level-progress-fill" id="lb-'+k+'" style="background:'+lvl.color+';width:'+pct+'%"></div></div>';

    var ch='<div class="level-content">';
    lvl.categories.forEach(function(cat){
      ch+='<div class="category"><div class="category-title">'+cat.name+'</div><div class="rules-grid">';
      cat.rules.forEach(function(r){
        var isDone=done[r.id];
        var ck=isDone?'background:'+lvl.color+';border-color:'+lvl.color+';color:#000':'border-color:var(--border2)';
        ch+='<div class="rule-item'+(isDone?' done':'')+'" id="ri-'+r.id+'">';
        ch+='<div class="rule-top" onclick="toggleRule(\''+r.id+'\')">';
        ch+='<div class="rule-check" style="'+ck+'">'+(isDone?'✓':'')+'</div>';
        ch+='<div class="rule-main"><div class="rule-text">'+r.text+'</div>';
        if(r.note)ch+='<span class="rule-note">'+r.note+'</span>';
        ch+='</div>';
        if(r.exp){ch+='<div class="rule-actions"><button class="info-btn" onclick="toggleExp(\''+r.id+'\',this,event)">ℹ info</button></div>';}
        ch+='</div>';
        if(r.exp){
          ch+='<div class="rule-exp" id="exp-'+r.id+'">';
          ch+=r.exp;
          if(r.ex&&r.ex.length){
            ch+='<ul class="ex-list">';
            r.ex.forEach(function(e){ch+='<li>'+e[0]+(e[1]?'<span class="tr">'+e[1]+'</span>':'')+'</li>';});
            ch+='</ul>';
          }
          if(r.exc)ch+='<div class="exc-block"><strong>⚠️ Исключения:</strong> '+r.exc+'</div>';
          if(r.tip)ch+='<div class="tip-block"><strong>💡 Совет:</strong> '+r.tip+'</div>';
          if(r.links&&r.links.length){
            ch+='<div class="link-row">';
            r.links.forEach(function(l){
              var t=l[2]||EN;
              var icon=t===YT?'▶':t===RU?'RU':'EN';
              ch+='<a class="lnk '+t+'" href="'+l[1]+'" target="_blank" rel="noopener" onclick="event.stopPropagation()"><span class="lnk-dot"></span>'+icon+' '+l[0]+'</a>';
            });
            ch+='</div>';
          }
          ch+='</div>';
        }
        ch+='</div>';
      });
      ch+='</div></div>';
    });
    ch+='</div>';
    block.innerHTML=hh+ch;
    path.appendChild(block);
  });
  updAll();
}

function confirmReset(){if(confirm('Сбросить весь прогресс?')){done={};saveD(done);renderAll();}}
renderAll();
</script>
</body>
</html>
