<html lang="ru"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Grammar Tree</title>
<style>
:root{
  --bg:#0d0f14;--bg2:#131620;--bg3:#1a1e2a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#e8eaf0;--muted:#6b7080;--muted2:#8b92a8;
  --a1:#4ade80;--a1bg:rgba(74,222,128,0.09);
  --a2:#34d399;--a2bg:rgba(52,211,153,0.09);
  --b1:#38bdf8;--b1bg:rgba(56,189,248,0.09);
  --b2:#818cf8;--b2bg:rgba(129,140,248,0.09);
  --c1:#f472b6;--c1bg:rgba(244,114,182,0.09);
  --c2:#fb923c;--c2bg:rgba(251,146,60,0.09);
  --yt:#ff4444;--ru:#5b9cf6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(ellipse 60% 40% at 15% 20%,rgba(129,140,248,0.05) 0%,transparent 60%),radial-gradient(ellipse 40% 60% at 85% 80%,rgba(251,146,60,0.04) 0%,transparent 60%);pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:2rem 1.25rem 6rem;}

/* Header */
header{margin-bottom:2rem;}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap;margin-bottom:1rem;}
.header-container{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.title-block {display:flex;flex-direction:column;gap:16px;}
.title-block h1{font-family:'DM Serif Display',serif;font-size:clamp(1.8rem,4.5vw,2.6rem);font-weight:400;line-height:1.1;letter-spacing:-0.02em;}
.title-block h1 span{font-style:italic;color:var(--b2);}
.title-block p{color:var(--muted2);font-size:13px;margin-top:6px;font-weight:300;line-height:1.5;}
.overall-progress{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:1rem 1.25rem;min-width:170px;text-align:center;flex-shrink:0;}
.overall-num{font-family:'DM Mono',monospace;font-size:1.9rem;font-weight:500;color:var(--b2);line-height:1;}
.overall-label{font-size:11px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.07em;}
.overall-bar-bg{height:4px;background:var(--border2);border-radius:2px;margin-top:8px;overflow:hidden;}
.overall-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--b1),var(--b2));transition:width 0.5s ease;}
.stats-row{display:flex;gap:8px;flex-wrap:wrap;}
.stat-chip{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:6px 12px;font-size:12px;color:var(--muted2);display:flex;align-items:center;gap:5px;}
.stat-chip strong{color:var(--text);font-weight:500;}

/* Search */
.search-wrap{position:relative;}
.search-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:14px;pointer-events:none;}
.search-input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:10px 14px 10px 38px;font-size:14px;color:var(--text);font-family:'Outfit',sans-serif;outline:none;transition:border-color 0.2s;}
.search-input:focus{border-color:var(--border2);}
.search-input::placeholder{color:var(--muted);}

/* Level blocks */
.level-path{display:flex;flex-direction:column;gap:0;}
.level-block{position:relative;margin-bottom:24px;}
.level-block:not(:last-child)::after{content:'';position:absolute;left:20px;bottom:-24px;width:2px;height:28px;background:var(--border2);z-index:2;}
.level-header{display:flex;align-items:center;gap:12px;padding:1rem 1.15rem;background:var(--bg2);border:1px solid var(--border);border-radius:13px;cursor:pointer;transition:border-color 0.2s,background 0.2s;position:relative;z-index:3;user-select:none;border-bottom-right-radius:0;border-bottom-left-radius:0;border-bottom:none;}
.level-header:hover{border-color:var(--border2);background:var(--bg3);}
.level-dot{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;flex-shrink:0;border:2px solid;transition:all 0.3s;}
.level-info{flex:1;min-width:0;}
.level-name{font-size:15px;font-weight:500;}
.level-sub{font-size:12px;color:var(--muted2);margin-top:1px;font-weight:300;}
.level-stats{text-align:right;flex-shrink:0;}
.level-frac{font-family:'DM Mono',monospace;font-size:17px;font-weight:500;}
.level-pct{font-size:11px;color:var(--muted);margin-top:1px;}
.level-toggle{color:var(--muted);font-size:15px;transition:transform 0.38s cubic-bezier(0.34,1.56,0.64,1);flex-shrink:0;}
.level-block.open .level-toggle{transform:rotate(180deg);}

/* Level header open glow effect */
.level-header{display:flex;align-items:center;gap:12px;padding:1rem 1.15rem;background:var(--bg2);border:1px solid var(--border);border-radius:13px;cursor:pointer;transition:border-color 0.25s,background 0.25s,box-shadow 0.25s;position:relative;z-index:3;user-select:none;border-bottom-right-radius:0;border-bottom-left-radius:0;border-bottom:none;}
.level-block.open .level-header{border-color:var(--border2);}
.level-header:hover{border-color:var(--border2);background:var(--bg3);}
.level-header:active{transform:scale(0.995);}

/* Level dot spin on open */
.level-block.open .level-dot{
  animation:dotPulse 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes dotPulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.18) rotate(8deg);}
  100%{transform:scale(1) rotate(0deg);}
}
.level-progress-bar{height:3px;background:var(--border);border-radius:0 0 13px 13px;overflow:hidden;margin-top:-3px;position:relative;z-index:3;}
.level-progress-fill{height:100%;border-radius:2px;transition:width 0.4s ease;}

/* Content */
.level-content{
  padding:0 0 4px 50px;position:relative;z-index:2;
  overflow:hidden;
  max-height:0;
  opacity:0;
  pointer-events:none;
  transition: max-height 0.46s cubic-bezier(0.22,1,0.36,1),
              opacity 0.3s ease;
}
.level-block.open .level-content{
  opacity:1;
  pointer-events:auto;
}

/* Rule item entrance stagger */
.level-block.open .rules-grid .rule-item{
  animation: ruleItemEnter 0.38s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes ruleItemEnter{
  0%{opacity:0;transform:translateX(-18px);}
  100%{opacity:1;transform:translateX(0);}
}

/* Category entrance */
.level-block.open .category{
  animation: categoryFade 0.4s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes categoryFade{
  0%{opacity:0;transform:translateY(-6px);}
  100%{opacity:1;transform:translateY(0);}
}

.level-content::before{content:'';position:absolute;left:20px;top:-16px;bottom:4px;width:2px;background:var(--border2);}
.category{margin-top:16px;position:relative;}
.category::before{content:'';position:absolute;left:-28px;top:5.5px;width:20px;height:2px;background:var(--border2);}
.category-title{font-size:10px;text-transform:uppercase;letter-spacing:0.13em;color:var(--muted);font-weight:600;margin-bottom:7px;}
.rules-grid{display:flex;flex-direction:column;gap:5px;}

/* Rule item */
.rule-item{border-radius:9px;border:1px solid var(--border);background:var(--bg);transition:border-color 0.15s,background 0.15s;overflow:hidden;}
.rule-item:hover{border-color:var(--border2);}
.rule-item.done{border-color:transparent;background:transparent;}
.rule-item.hidden-search{display:none;}
.rule-top{display:flex;align-items:flex-start;gap:9px;padding:9px 11px;cursor:pointer;}
.rule-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-size:10px;}
.rule-main{flex:1;min-width:0;}
.rule-text{font-size:13.5px;line-height:1.5;color:var(--text);font-weight:400;}
.rule-item.done .rule-text{color:var(--muted2);text-decoration:line-through;text-decoration-color:var(--muted);}
.rule-note{font-size:11.5px;color:var(--muted);margin-top:2px;display:block;font-style:italic;}
.rule-actions{display:flex;align-items:center;gap:5px;flex-shrink:0;padding-top:1px;}
.info-btn{background:none;border:1px solid var(--border);border-radius:5px;color:var(--muted);font-size:10px;padding:2px 7px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.15s;white-space:nowrap;line-height:1.4;}
.info-btn:hover{border-color:var(--border2);color:var(--muted2);}
.info-btn.open{border-color:var(--b2);color:var(--b2);}
.test-btn{background:none;border:1px solid rgba(129,140,248,0.35);border-radius:5px;color:var(--b2);font-size:10px;padding:2px 7px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.15s;white-space:nowrap;line-height:1.4;font-weight:500;}
.test-btn:hover{border-color:var(--b2);background:rgba(129,140,248,0.08);color:#a5b4fc;}
.test-btn:active{transform:scale(0.95);}
.test-btn.copied{border-color:var(--a1);color:var(--a1);background:rgba(74,222,128,0.08);}

/* Global test button */
.global-test-btn{background:linear-gradient(135deg,rgba(129,140,248,0.15),rgba(56,189,248,0.1));border:1px solid rgba(129,140,248,0.4);border-radius:10px;color:var(--b2);font-size:13px;padding:10px 18px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.2s;font-weight:500;display:flex;align-items:center;gap:8px;}
.global-test-btn:hover{border-color:var(--b2);background:linear-gradient(135deg,rgba(129,140,248,0.22),rgba(56,189,248,0.15));color:#a5b4fc;box-shadow:0 0 18px rgba(129,140,248,0.15);}
.global-test-btn:active{transform:scale(0.98);}
.global-test-btn .btn-icon{font-size:15px;}

/* Rule expand arrow */
.rule-arrow{font-size:11px;color:var(--muted);transition:transform 0.3s cubic-bezier(0.34,1.56,0.64,1),color 0.2s;flex-shrink:0;line-height:1;padding:2px 3px;margin-top:3px;}
.rule-arrow.open{transform:rotate(180deg);color:var(--b2);}

/* Explanation panel */
.rule-exp{
  margin:0 11px 11px;padding:0 13px;
  background:var(--bg2);border-radius:8px;border:1px solid var(--border);
  font-size:13px;line-height:1.75;color:var(--muted2);
  overflow:hidden;
  max-height:0;
  opacity:0;
  pointer-events:none;
  transition: max-height 0.44s cubic-bezier(0.22,1,0.36,1),
              opacity 0.28s ease,
              padding 0.3s ease;
}
.rule-exp.open{
  opacity:1;
  pointer-events:auto;
  padding:11px 13px;
  /* max-height set by JS */
}
.rule-exp.closing{
  /* closing handled by JS setting max-height:0 */
}
.rule-exp strong{color:var(--text);font-weight:500;}
.rule-exp em{color:var(--b1);font-style:normal;}
.rule-exp .ex-list{margin:8px 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:3px;}
.rule-exp .ex-list li{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted2);padding:4px 8px;background:var(--bg3);border-radius:5px;}
.rule-exp .ex-list li .tr{color:var(--muted);font-style:italic;font-family:'Outfit',sans-serif;font-size:11px;display:block;margin-top:1px;}
.exc-block{margin-top:8px;padding:8px 10px;background:rgba(251,146,60,0.07);border-radius:6px;border-left:2px solid var(--c2);font-size:12px;color:var(--muted2);}
.exc-block strong{color:var(--c2);}
.tip-block{margin-top:8px;padding:8px 10px;background:rgba(56,189,248,0.07);border-radius:6px;border-left:2px solid var(--b1);font-size:12px;color:var(--muted2);}
.tip-block strong{color:var(--b1);}
.mistakes-block{margin-top:8px;padding:8px 10px;background:rgba(244,114,182,0.07);border-radius:6px;border-left:2px solid var(--c1);font-size:12px;color:var(--muted2);}
.mistakes-block strong{color:var(--c1);}
.mistakes-block ul{margin:4px 0 0 14px;padding:0;list-style:disc;}
.mistakes-block ul li{margin-bottom:3px;line-height:1.6;}
.markers-block{margin-top:8px;padding:9px 11px;background:rgba(56,189,248,0.06);border-radius:6px;border-left:2px solid var(--b1);font-size:12px;color:var(--muted2);}
.markers-block strong{color:var(--b1);display:block;margin-bottom:5px;}
.markers-wrap{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px;}
.marker-tag{background:var(--bg3);border:1px solid rgba(56,189,248,0.2);border-radius:4px;padding:2px 7px;font-family:'DM Mono',monospace;font-size:11px;color:var(--b1);white-space:nowrap;}
.markers-note{margin-top:5px;font-style:italic;color:var(--muted);font-size:11px;}

/* Links */
.link-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
.lnk{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--border2);color:var(--muted2);text-decoration:none;transition:all 0.15s;white-space:nowrap;display:inline-flex;align-items:center;gap:4px;}
.lnk:hover{color:var(--text);border-color:var(--muted2);}
.lnk.yt{border-color:rgba(255,68,68,0.3);color:#ff8888;}
.lnk.yt:hover{border-color:var(--yt);color:var(--yt);}
.lnk.ru{border-color:rgba(91,156,246,0.3);color:#8ab4f8;}
.lnk.ru:hover{border-color:var(--ru);color:var(--ru);}
.lnk-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.yt .lnk-dot{background:var(--yt);}
.ru .lnk-dot{background:var(--ru);}

/* ── Check animation ─────────────────────────────────────── */
@keyframes pop{0%{transform:scale(0.5);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}

@keyframes checkPulse{
  0%{box-shadow:0 0 0 0 rgba(var(--chk-rgb,74,222,128),0.7)}
  60%{box-shadow:0 0 0 10px rgba(var(--chk-rgb,74,222,128),0)}
  100%{box-shadow:0 0 0 0 rgba(var(--chk-rgb,74,222,128),0)}
}
@keyframes checkmarkDraw{
  0%{stroke-dashoffset:20}
  100%{stroke-dashoffset:0}
}
@keyframes ruleSlideIn{
  0%{transform:translateX(-6px);opacity:0.5}
  100%{transform:translateX(0);opacity:1}
}
@keyframes ruleGlow{
  0%{box-shadow:0 0 0 0 rgba(var(--chk-rgb,74,222,128),0.25);border-color:rgba(var(--chk-rgb,74,222,128),0.6)}
  50%{box-shadow:0 0 18px 2px rgba(var(--chk-rgb,74,222,128),0.18);border-color:rgba(var(--chk-rgb,74,222,128),0.9)}
  100%{box-shadow:none;border-color:transparent}
}
@keyframes textStrike{
  0%{text-decoration-color:transparent}
  100%{text-decoration-color:var(--muted)}
}
@keyframes particleFly{
  0%{transform:translate(0,0) scale(1);opacity:1}
  100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}
}
@keyframes uncheck{
  0%{transform:scale(1);opacity:1}
  30%{transform:scale(0.7) rotate(-15deg);opacity:0.7}
  100%{transform:scale(1);opacity:1}
}

.rule-check{position:relative;overflow:visible !important;}

/* svg checkmark inside .rule-check */
.rule-check svg.chk-svg{
  position:absolute;inset:0;width:100%;height:100%;
  pointer-events:none;
}
.rule-check svg.chk-svg path{
  stroke-dasharray:20;
  stroke-dashoffset:0;
  transition:none;
}
.rule-check.anim-check svg.chk-svg path{
  animation:checkmarkDraw 0.25s 0.08s ease forwards;
}
.rule-check.anim-check{
  animation:checkPulse 0.55s ease forwards;
}

.rule-item.celebrate-enter{
  animation:ruleSlideIn 0.25s ease, ruleGlow 0.7s 0.1s ease forwards;
}
.rule-item.celebrate-enter .rule-text{
  animation:ruleSlideIn 0.3s ease;
}
.rule-item.celebrate-enter.done .rule-text{
  animation:textStrike 0.4s 0.2s ease forwards;
  text-decoration-color:transparent;
}

.rule-item.uncheck-anim .rule-check{
  animation:uncheck 0.3s ease;
}

/* Particle canvas layer */
.rule-check-wrap{position:relative;display:inline-flex;flex-shrink:0;margin-top:2px;}
.particle-canvas{position:fixed;pointer-events:none;z-index:9999;}

.reset-btn{background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.15s;margin-top:2rem;}
.reset-btn:hover{border-color:var(--border2);color:var(--text);}
.no-results{text-align:center;padding:3rem 1rem;color:var(--muted);}

/* ── Tab navigation ── */
.tabs{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap;}
.tab-btn{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:7px 16px;font-size:13px;color:var(--muted2);cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.18s;font-weight:400;}
.tab-btn:hover{border-color:var(--border2);color:var(--text);}
.tab-btn.active{background:rgba(129,140,248,0.12);border-color:var(--b2);color:var(--b2);font-weight:500;}
.tab-pane{display:none;}
.tab-pane.active{display:block;}

/* ── Tense tree ── */
.tense-tree{max-width:100%;margin:0;}
.tt-intro{font-size:14px;color:var(--muted2);margin-bottom:1.5rem;line-height:1.7;}
.tt-intro strong{color:var(--text);}
.tt-step{margin-bottom:1rem;}
.tt-question{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:14px 16px;font-size:14px;color:var(--text);font-weight:500;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.tt-question .tt-q-icon{font-size:18px;flex-shrink:0;}
.tt-choices{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
@media(max-width:560px){.tt-choices{grid-template-columns:1fr;}}
.tt-choice{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:10px 14px;font-size:13px;color:var(--muted2);cursor:pointer;transition:all 0.17s;display:flex;align-items:center;gap:10px;}
.tt-choice:hover{border-color:var(--border2);color:var(--text);background:var(--bg2);}
.tt-choice.selected{border-color:var(--b2);background:rgba(129,140,248,0.09);color:var(--text);}
.tt-choice .choice-arrow{margin-left:auto;color:var(--muted);font-size:12px;flex-shrink:0;}
.tt-result{background:var(--bg2);border:1px solid var(--border2);border-radius:13px;padding:18px;margin-top:8px;display:grid;grid-template-columns:1fr 1fr;gap:0 24px;align-items:start;}
.tt-result-left{grid-column:1;}
.tt-result-right{grid-column:2;}
@media(max-width:600px){.tt-result{grid-template-columns:1fr;}.tt-result-left,.tt-result-right{grid-column:1;}}
.tt-result-name{font-size:17px;font-weight:600;color:var(--b2);margin-bottom:4px;font-family:'DM Serif Display',serif;font-style:italic;}
.tt-result-formula{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted2);background:var(--bg3);padding:5px 10px;border-radius:6px;display:inline-block;margin-bottom:10px;}
.tt-result-desc{font-size:13px;color:var(--muted2);line-height:1.7;margin-bottom:10px;}
.tt-result-ex{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:4px;}
.tt-result-ex li{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted2);padding:4px 9px;background:var(--bg3);border-radius:5px;}
.tt-result-ex li .tr{color:var(--muted);font-style:italic;font-family:'Outfit',sans-serif;font-size:11px;display:block;}
.tt-mistakes{margin-top:10px;padding:9px 11px;background:rgba(244,114,182,0.07);border-radius:7px;border-left:2px solid var(--c1);font-size:12px;color:var(--muted2);}
.tt-mistakes strong{color:var(--c1);}
.tt-restart{background:none;border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.15s;margin-top:12px;display:block;}
.tt-restart:hover{border-color:var(--border2);color:var(--text);}
.tt-breadcrumb{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px;min-height:24px;}
.tt-crumb{font-size:11px;color:var(--muted);background:var(--bg2);border:1px solid var(--border);padding:3px 9px;border-radius:20px;}
.tt-crumb .sep{color:var(--border2);margin:0 4px;}
.tt-all-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:1rem;}
@media(max-width:700px){.tt-all-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:420px){.tt-all-grid{grid-template-columns:1fr;}}
.tt-card{background:var(--bg2);border:1px solid var(--border);border-radius:11px;padding:13px 14px;cursor:pointer;transition:all 0.17s;}
.tt-card:hover{border-color:var(--border2);background:var(--bg3);}
.tt-card.active{box-shadow:0 0 0 1px currentColor;}
.tt-card-name{font-size:13px;font-weight:500;color:var(--text);margin-bottom:3px;}
.tt-card-formula{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted2);}
.tt-card-hint{font-size:11px;color:var(--muted);margin-top:3px;}
.tt-section-title{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);font-weight:600;margin:1rem 0 6px;}
/* Timeline chart */
.tt-timeline-wrap{margin:1.5rem 0 0;background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:18px 16px 14px;overflow:hidden;}
.tt-timeline-title{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);font-weight:600;margin-bottom:14px;}
.tt-timeline-canvas{width:100%;display:block;cursor:pointer;}
.tt-timeline-legend{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:12px;}

.tt-timeline-tooltip{position:fixed;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--text);pointer-events:none;z-index:999;display:none;max-width:220px;line-height:1.5;}
.tt-timeline-tooltip .ttt-name{font-weight:600;margin-bottom:2px;}
.tt-timeline-tooltip .ttt-desc{color:var(--muted2);font-size:11px;}
</style>

<script>
// link helpers: [label, url, type]  type: 'yt'=youtube ru='russian text' en='english exercises'
var YT='yt', RU='ru', EN='en';

var DATA=[
{id:'A1',name:'A1 — Начальный',sub:'Beginner · 2–3 месяца',color:'var(--a1)',colorBg:'var(--a1bg)',
categories:[
{name:'Глагол to be',rules:[
{id:'a1_01',text:'am / is / are — формы глагола to be',note:'I am, he is, they are',
exp:`<strong>to be</strong> — самый важный глагол английского языка, аналог русского «быть/являться».
<br><br>Три формы: <em>am</em> — только с <em>I</em>; <em>is</em> — с he, she, it; <em>are</em> — с you, we, they.
<br><br>⚠️ Важное отличие от русского: в английском глагол <strong>нельзя пропустить</strong>. По-русски говорим «Я студент», а по-английски обязательно: <em>I <u>am</u> a student</em>.`,
ex:[['I am hungry.','Я голоден.'],['She is a doctor.','Она врач.'],['They are ready.','Они готовы.'],['It is cold today.','Сегодня холодно.']],
exc:'Сокращённые формы: I\'m, you\'re, he\'s, she\'s, it\'s, we\'re, they\'re. В кратких ответах сокращение запрещено: <em>Yes, I am.</em> (не ~~Yes, I\'m~~)',
links:[['OK English: глагол to be (видео на рус.)','https://ok-english.ru/video-free/',YT],['Skyeng: упражнения','https://skyeng.ru/exercises/to-be-present-simple/',RU],['Perfect English Grammar','https://www.perfect-english-grammar.com/verb-be.html',EN],['native-english.ru: глагол to be','https://www.native-english.ru/grammar/verb-to-be',RU]]},

{id:'a1_02',text:"Отрицание: am not / isn't / aren't",note:"I'm not tired. He isn't here. They aren't ready.",
exp:`Отрицание строится добавлением <em>not</em>: <em>am not, is not, are not</em>.
<br>Краткие формы: <em>isn't</em> (= is not), <em>aren't</em> (= are not). Только <em>am not</em> не сокращается в <em>amn't</em> — исключение!`,
ex:[["I'm not a student.","Я не студент."],["He isn't tired.","Он не устал."],["We aren't ready.","Мы не готовы."]],
links:[['Упражнения на отрицание','https://www.perfect-english-grammar.com/verb-be-exercise-1.html',EN],['englex.ru: объяснение','https://englex.ru/verb-to-be-in-english/',RU],['native-english.ru: глагол to be','https://www.native-english.ru/grammar/verb-to-be',RU]]},

{id:'a1_03',text:'Вопросы с to be: Am I? / Is she? / Are they?',note:'Is she a teacher? Are you cold? Am I late?',
exp:`В вопросах глагол <em>to be</em> выносится <strong>перед подлежащим</strong>: <em>She is → Is she?</em>
<br><br>Специальные вопросы: вопросительное слово + to be + подлежащее: <em>Where is he? What is this?</em>
<br><br>Краткие ответы: <em>Yes, I am. / No, she isn't.</em>`,
ex:[['Are you a student?','Ты студент?'],['Is it expensive?','Это дорого?'],['Where are they?','Где они?']],
links:[['Упражнения','https://www.perfect-english-grammar.com/verb-be-exercise-2.html',EN],['native-english.ru: глагол to be','https://www.native-english.ru/grammar/verb-to-be',RU]]},

{id:'a1_04',text:'Краткие ответы: Yes, I am. / No, she isn\'t.',note:'Только полная форма — нельзя: "Yes, I\'m"',
exp:`В кратких ответах местоимение + <em>to be</em>. <strong>Нельзя сокращать</strong> форму глагола в утвердительном ответе.
<br><em>Are you tired? — Yes, I am.</em> ✓ &nbsp;&nbsp; <em>Yes, I'm.</em> ✗`,
ex:[["Is she ready? — Yes, she is.","Она готова? — Да."],["Are they your friends? — No, they aren't.","Они твои друзья? — Нет."]],
links:[['British Council: to be exercises','https://learnenglish.britishcouncil.org/grammar/a1-a2-grammar/the-verb-be',EN],['native-english.ru: глагол to be','https://www.native-english.ru/grammar/verb-to-be',RU]]}
]},

{name:'Артикли',rules:[
{id:'a1_05',text:'Артикль a / an — неопределённый',note:'a dog, an apple, an hour, a university',
exp:`<em>a</em> и <em>an</em> — неопределённый артикль, ставится перед <strong>впервые упоминаемым</strong> предметом в единственном числе.
<br><br>Выбор зависит от <strong>звука</strong>, а не буквы:
<br>• <em>a</em> — перед согласным звуком: <em>a book, a car, a university</em> [ju...]
<br>• <em>an</em> — перед гласным звуком: <em>an apple, an hour</em> [aʊ...], <em>an honest man</em>`,
ex:[['I saw a cat in the garden.','Я увидел кошку в саду.'],['She is an engineer.','Она инженер.'],['It took an hour.','Это заняло час.']],
exc:'<em>a university, a European</em> — хотя начинаются на гласную букву, начальный звук [j], поэтому <em>a</em>. <em>an hour, an honest</em> — h немая, начальный звук гласный.',
links:[['Perfect English Grammar: articles','https://www.perfect-english-grammar.com/articles.html',EN],['Skyeng: артикли упражнения','https://skyeng.ru/exercises/articles/',RU],['native-english.ru: неопределённый артикль','https://www.native-english.ru/grammar/indefinite-article',RU]]},

{id:'a1_06',text:'Артикль the — определённый',note:'the sun, the door, the book on the table',
exp:`<em>the</em> используется когда говорящий и слушающий <strong>знают</strong>, о чём речь.
<br><br>Когда ставим <em>the</em>:
<br>1. Предмет уже упоминался: <em>I saw a cat. The cat was black.</em>
<br>2. Единственный в своём роде: <em>the sun, the moon, the earth</em>
<br>3. Понятно из контекста: <em>Close the window, please.</em>
<br>4. Превосходная степень: <em>the best, the biggest</em>`,
ex:[['The film we saw was amazing.','Фильм, который мы смотрели, был потрясающим.'],['Could you pass the salt?','Не мог бы ты передать соль?']],
exc:'Произношение: <em>the</em> [ðə] перед согласными, [ði] перед гласными. В устной речи часто [ðɪ] для эмфазы.',
links:[['Объяснение the','https://www.perfect-english-grammar.com/the.html',EN],['engblog.ru: артикли','https://engblog.ru/articles',RU],['native-english.ru: определённый артикль','https://www.native-english.ru/grammar/definite-article',RU]]},

{id:'a1_07',text:'Нулевой артикль — когда артикль не нужен',note:'I like music. She plays tennis. He is from Russia.',
exp:`Артикль <strong>не ставится</strong> перед:
<br>• Именами собственными: <em>John, London, Russia</em>
<br>• Языками и национальностями: <em>English, Russian</em>
<br>• Видами спорта и играми: <em>football, chess</em>
<br>• Едой/напитками в общем смысле: <em>I love coffee</em>
<br>• Абстрактными понятиями в общем: <em>Life is short. Love is blind.</em>
<br>• Множественным числом в общем смысле: <em>Dogs are friendly.</em>`,
ex:[['She speaks Spanish.','Она говорит по-испански.'],['He plays basketball every day.','Он играет в баскетбол каждый день.']],
links:[['Zero article','https://www.perfect-english-grammar.com/zero-article.html',EN],['native-english.ru: нулевой артикль','https://www.native-english.ru/grammar/zero-article',RU]]},
]},

{name:'Present Simple',rules:[
{id:'a1_08',text:'Present Simple — утвердительные предложения',note:'I work. He works. She goes. It runs.',
exp:`<strong>Present Simple</strong> используется для: привычек и регулярных действий, фактов и общих истин, расписаний.
<br><br>Формула: I/you/we/they + инфинитив; he/she/it + инфинитив+<em>s/es</em>
<br><br>Правила написания окончания <em>-s</em>/-<em>es</em>:
<br>• Большинство глаголов: + <em>s</em> → <em>works, plays</em>
<br>• Оканчиваются на -o, -ch, -sh, -s, -ss, -x: + <em>es</em> → <em>goes, watches, washes</em>
<br>• Оканчиваются на согласную + -y: -y → <em>ies</em> → <em>studies, tries</em>`,
ex:[['I drink coffee every morning.','Я пью кофе каждое утро.'],['She works in a hospital.','Она работает в больнице.'],['The Earth goes round the Sun.','Земля вращается вокруг Солнца.']],
exc:'Исключения: <em>have → has, be → is, do → does, go → goes</em>',
tip:'Маркеры времени: always, usually, often, sometimes, rarely, never, every day/week.',
links:[['OK English: Present Simple (видео)','https://ok-english.ru/video-free/',YT],['Skyeng: упражнения','https://skyeng.ru/exercises/present-simple/',RU],['Perfect English Grammar','https://www.perfect-english-grammar.com/present-simple.html',EN],['native-english.ru: Present Simple','https://www.native-english.ru/grammar/present-simple',RU]]},

{id:'a1_09',text:"Present Simple — отрицание: don't / doesn't",note:"I don't like. He doesn't like. (не: he don't)",
exp:`Отрицание строится с помощью вспомогательного глагола <em>do/does</em> + <em>not</em>:
<br>• I/you/we/they + <em>don't</em> + инфинитив
<br>• he/she/it + <em>doesn't</em> + инфинитив
<br><br>⚠️ После <em>doesn't</em> основной глагол <strong>без -s</strong>! <em>She doesn't like</em> (не ~~likes~~).`,
ex:[["I don't eat meat.","Я не ем мясо."],["He doesn't speak French.","Он не говорит по-французски."],["They don't work here.","Они здесь не работают."]],
links:[['Упражнения на отрицание','https://www.perfect-english-grammar.com/present-simple-exercise-3.html',EN],['native-english.ru: Present Simple','https://www.native-english.ru/grammar/present-simple',RU]]},

{id:'a1_10',text:'Present Simple — вопросы: Do you? / Does she?',note:'Do you like pizza? Does he work here? Where do they live?',
exp:`Вопросы: <em>Do/Does</em> + подлежащее + инфинитив?
<br>• I/you/we/they: <em>Do you...?</em>
<br>• he/she/it: <em>Does she...?</em>
<br><br>Специальные вопросы: вопросительное слово + do/does + подлежащее + инфинитив:
<br><em>Where does she live? What do they do?</em>
<br><br>⚠️ Исключение: вопрос «Кто?» без <em>do</em>: <em>Who likes ice cream?</em>`,
ex:[['Do you speak Russian?','Ты говоришь по-русски?'],['Does she live nearby?','Она живёт рядом?'],['Where do you work?','Где ты работаешь?']],
links:[['Вопросы Present Simple','https://www.perfect-english-grammar.com/present-simple-exercise-5.html',EN],['engfairy.com упражнения','https://engfairy.com/present-simple-tense-uprazhneniya/',RU],['native-english.ru: Present Simple','https://www.native-english.ru/grammar/present-simple',RU]]},

{id:'a1_11',text:'Stative verbs — глаголы, не употребляемые в Continuous',note:'I know, not: I am knowing. I love, not: I am loving.',
exp:`Некоторые глаголы описывают <strong>состояние</strong>, а не действие — они не используются в Continuous временах.
<br><br>Основные группы:
<br>• Мнения: <em>know, believe, think, understand, remember, forget</em>
<br>• Чувства: <em>love, hate, like, want, need, prefer</em>
<br>• Восприятие: <em>see, hear, smell, taste, look</em>
<br>• Бытие: <em>be, exist, belong, contain, seem, appear</em>`,
ex:[['I understand you. (не: I am understanding)','Я тебя понимаю.'],['She loves chocolate. (не: is loving)','Она любит шоколад.']],
exc:'<em>think/have/see/taste</em> могут использоваться в Continuous, но со другим значением: <em>I think</em> (мнение) vs <em>I\'m thinking</em> (размышляю прямо сейчас).',
links:[['Stative verbs','https://www.perfect-english-grammar.com/stative-verbs.html',EN],['native-english.ru: классификация глаголов','https://www.native-english.ru/grammar/english-verbs',RU]]},
]},

{name:'Местоимения',rules:[
{id:'a1_12',text:'Личные местоимения: I, you, he, she, it, we, they',note:'Всегда нужно явное подлежащее — нельзя пропустить I',
exp:`В отличие от русского, в английском <strong>подлежащее всегда обязательно</strong>.
<br>По-русски: «Иду домой». По-английски: <em>I am going home.</em>
<br><br>Объектные формы (после глагола или предлога): <em>me, you, him, her, it, us, them</em>.`,
ex:[['She is a teacher.','Она учитель.'],['Tell him the truth.','Скажи ему правду.'],['Can you help me?','Можешь мне помочь?']],
links:[['British Council: pronouns','https://learnenglish.britishcouncil.org/grammar/a1-a2-grammar/subject-and-object-pronouns',EN],['native-english.ru: личные местоимения','https://www.native-english.ru/grammar/personal-pronouns',RU]]},

{id:'a1_13',text:'Притяжательные прилагательные: my, your, his, her, its, our, their',note:'my book, her car, their house — не изменяются по числу',
exp:`Притяжательные прилагательные показывают принадлежность и стоят <strong>перед существительным</strong>.
<br>Важно: <em>its</em> (без апострофа) = принадлежность; <em>it's</em> (с апострофом) = it is.
<br><br>Не изменяются по роду и числу: <em>my friend / my friends</em> — одинаково.`,
ex:[['This is my phone.','Это мой телефон.'],['Their dog is cute.','Их собака милая.'],['The cat hurt its paw.','Кошка поранила лапу.']],
links:[['Упражнения','https://www.englisch-hilfen.de/en/exercises/pronouns/possessive_pronouns.htm',EN],['native-english.ru: притяжательные местоимения','https://www.native-english.ru/grammar/possessive-pronouns',RU]]},

{id:'a1_14',text:'Множественное число существительных',note:'cats, boxes, knives, children, men, sheep',
exp:`Основное правило: добавить <em>-s</em>.
<br><br>Особые случаи:
<br>• -s, -ss, -sh, -ch, -x, -o: + <em>es</em> → <em>boxes, watches, tomatoes</em>
<br>• гласная + -y: + <em>s</em> → <em>boys, days</em>
<br>• согласная + -y: -y → <em>ies</em> → <em>cities, babies</em>
<br>• -f/-fe: → <em>ves</em> → <em>knives, leaves, wives</em>
<br><br>Неправильные: <em>child→children, man→men, woman→women, tooth→teeth, foot→feet, mouse→mice, person→people, fish→fish, sheep→sheep</em>`,
ex:[['one bus → two buses','один автобус → два автобуса'],['one child → many children','один ребёнок → много детей']],
links:[['Plurals rules','https://www.perfect-english-grammar.com/plurals.html',EN],['Skyeng упражнения','https://skyeng.ru/exercises/nouns/',RU],['native-english.ru: множественное число','https://www.native-english.ru/grammar/english-nouns-plural',RU]]},

{id:'a1_15',text:'This / that / these / those',note:'this/these — рядом; that/those — далеко',
exp:`<em>this</em> (этот) — единственное число + рядом
<br><em>these</em> (эти) — множественное число + рядом
<br><em>that</em> (тот) — единственное число + далеко или уже известное
<br><em>those</em> (те) — множественное число + далеко
<br><br>Также используются о времени: <em>this week</em> (эта неделя), <em>that year</em> (тот год).`,
ex:[['This is my bag.','Это моя сумка.'],['Those shoes are expensive.','Те туфли дорогие.'],['What is that?','Что это такое?']],
links:[['British Council: this/that','https://learnenglish.britishcouncil.org/grammar/a1-a2-grammar/this-these-that-those',EN],['native-english.ru: указательные местоимения','https://www.native-english.ru/grammar/demonstrative-pronouns',RU]]},
]},

{name:'Базовые структуры',rules:[
{id:'a1_16',text:'There is / there are — существование',note:'There is a park. There are five rooms.',
exp:`Конструкция <em>there is/are</em> означает «существует/существуют», «есть».
<br>• <em>There is</em> + существительное в ед. числе
<br>• <em>There are</em> + существительное во мн. числе
<br><br>Отрицание: <em>There isn't / There aren't</em>
<br>Вопрос: <em>Is there...? / Are there...?</em>
<br><br>⚠️ Не путать с <em>it is</em>! <em>There is a book on the table</em> (книга существует там) vs <em>It is a good book</em> (характеристика).`,
ex:[['There is a cinema near here.','Рядом есть кинотеатр.'],["Are there any shops nearby? — Yes, there are.",'Есть ли магазины рядом? — Да.']],
links:[['Perfect English Grammar: there is/are','https://www.perfect-english-grammar.com/there-is-there-are.html',EN],['native-english.ru: существительные','https://www.native-english.ru/grammar/english-nouns',RU]]},

{id:'a1_17',text:'Предлоги места: in, on, at, under, next to, behind, between',note:'in the box, on the table, at the station',
exp:`Три главных предлога:
<br>• <em>in</em> = внутри чего-либо: <em>in the box, in the city, in bed</em>
<br>• <em>on</em> = на поверхности: <em>on the table, on the wall, on the left</em>
<br>• <em>at</em> = в конкретной точке: <em>at the station, at home, at school</em>
<br><br>Другие: <em>under</em> (под), <em>next to/beside</em> (рядом), <em>behind</em> (за), <em>in front of</em> (перед), <em>between</em> (между), <em>opposite</em> (напротив)`,
ex:[['The keys are on the table.','Ключи на столе.'],['She is in the kitchen.','Она на кухне.'],['Meet me at the entrance.','Встретимся у входа.']],
links:[['Предлоги места','https://www.perfect-english-grammar.com/prepositions-of-place.html',EN],['Skyeng упражнения','https://skyeng.ru/exercises/prepositions/',RU],['native-english.ru: предлоги','https://www.native-english.ru/grammar/english-prepositions',RU]]},

{id:'a1_18',text:'Повелительное наклонение',note:'Open your books. Don\'t run. Please sit down.',
exp:`Повелительное наклонение = базовая форма глагола без подлежащего.
<br>Отрицание: <em>Don't + инфинитив</em>
<br><em>Please</em> делает просьбу вежливее (в начале или конце).
<br><br>Для включения говорящего: <em>Let's + инфинитив</em> → <em>Let's go! Let's eat!</em>`,
ex:[['Turn left at the crossroads.','Поверни налево на перекрёстке.'],["Don't touch that!",'Не трогай это!'],["Let's have a break.",'Давайте сделаем перерыв.']],
links:[['Imperative','https://www.perfect-english-grammar.com/imperative.html',EN],['native-english.ru: повелительное наклонение','https://www.native-english.ru/grammar/imperative-mood',RU]]},

{id:'a1_19',text:'can / can\'t — умение и разрешение',note:'I can swim. She can\'t drive. Can I help you?',
exp:`<em>can</em> — модальный глагол, выражает:
<br>1. Умение/способность: <em>I can play the guitar</em>
<br>2. Возможность: <em>It can be dangerous</em>
<br>3. Разрешение (разговорный): <em>Can I use your phone?</em>
<br><br>⚠️ <em>can</em> никогда не изменяется: <em>he can</em> (не ~~he cans~~). После него — инфинитив без <em>to</em>.`,
ex:[['I can speak three languages.','Я говорю на трёх языках.'],["She can't come today.",'Она не может прийти сегодня.'],['Can you help me, please?','Не могли бы вы мне помочь?']],
links:[['Can / could','https://www.perfect-english-grammar.com/can.html',EN],['native-english.ru: can/could','https://www.native-english.ru/grammar/modal-verb-can',RU]]},

{id:'a1_20',text:'Вопросительные слова: what, where, who, when, how, why, which, whose, how much/many',note:'What is this? Where do you live? How old are you?',
exp:`Вопросительные слова стоят в <strong>начале</strong> вопроса, после них — вспомогательный глагол перед подлежащим.
<br><br>• <em>what</em> = что/какой
<br>• <em>where</em> = где/куда
<br>• <em>who</em> = кто (вопрос без do: <em>Who lives here?</em>)
<br>• <em>when</em> = когда
<br>• <em>why</em> = почему
<br>• <em>how</em> = как; <em>how much</em> = сколько (несчисл.); <em>how many</em> = сколько (счисл.); <em>how old</em> = сколько лет; <em>how long</em> = как долго`,
ex:[['Where does she work?','Где она работает?'],['What time is it?','Который час?'],['How many brothers do you have?','Сколько у тебя братьев?']],
links:[['Question words','https://www.perfect-english-grammar.com/question-words.html',EN],['englex.ru вопросы','https://englex.ru/question-words-in-english/',RU],['native-english.ru: вопросительные местоимения','https://www.native-english.ru/grammar/interrogative-pronouns',RU]]},
]},

{name:'Числа и числительные',rules:[
{id:'a1_21',text:'Числительные количественные: 1–1000',note:'one, two, three... twenty-one, a hundred, a thousand',
exp:`Числительные 1–12: особые слова (one, two, three... twelve).
<br>13–19: + <em>-teen</em> (thirteen, fourteen... nineteen; исключения: thirteen, fifteen, eighteen).
<br>Десятки: twenty, thirty, forty, fifty, sixty, seventy, eighty, ninety.
<br>Составные: 21 = <em>twenty-one</em> (через дефис).
<br><br>100 = <em>a/one hundred</em>; 1000 = <em>a/one thousand</em>.
<br>После hundred/thousand — <em>and</em> (BrE): <em>two hundred and fifty</em>.`,
ex:[['She is twenty-three years old.','Ей двадцать три года.'],['The ticket costs four hundred pounds.','Билет стоит четыреста фунтов.']],
links:[['Numbers','https://www.perfect-english-grammar.com/numbers.html',EN],['Числительные RU','https://skyeng.ru/exercises/numbers/',RU],['native-english.ru: количественные числительные','https://www.native-english.ru/grammar/cardinal-numerals',RU]]},

{id:'a1_22',text:'Порядковые числительные: first, second, third...',note:'the first, the second, the third, the fourth... the twenty-first',
exp:`Порядковые числительные образуются добавлением <em>-th</em>: <em>fourth, fifth, sixth...</em>
<br>Исключения: <em>first (1st), second (2nd), third (3rd), fifth (5th), eighth (8th), ninth (9th), twelfth (12th)</em>.
<br>Всегда употребляются с артиклем <em>the</em>: <em>the first day, the third floor</em>.
<br><br>Дроби: ½ = <em>a half</em>, ⅓ = <em>a third</em>, ¼ = <em>a quarter</em>.`,
ex:[['My office is on the third floor.','Мой офис на третьем этаже.'],['Today is the first of March.','Сегодня первое марта.']],
links:[['Ordinal numbers','https://www.perfect-english-grammar.com/ordinal-numbers.html',EN],['native-english.ru: порядковые числительные','https://www.native-english.ru/grammar/ordinal-numerals',RU]]},
]},

{name:'Притяжательный падеж',rules:[
{id:'a1_23',text:"Притяжательный падеж: 's и s'",note:"John's car, my sister's friend, the children's toys, the teachers' room",
exp:`В английском принадлежность выражается апострофом + <em>s</em>:
<br>• Единственное число: <em>Tom's book</em>, <em>the dog's tail</em>
<br>• Множественное на -s: только апостроф: <em>the teachers' room, my parents' house</em>
<br>• Неправильное множественное: <em>'s</em>: <em>the children's playground, men's clothes</em>
<br>• Имена на -s: <em>James's / James'</em> — оба варианта верны`,
ex:[["This is Anna's laptop.",'Это ноутбук Анны.'],["The children's toys are in the box.",'Игрушки детей в ящике.']],
links:[['Possessive \'s','https://www.perfect-english-grammar.com/possessives.html',EN],['native-english.ru: падеж существительных','https://www.native-english.ru/grammar/english-nouns-cases',RU]]},
]},

{name:'Предлоги движения',rules:[
{id:'a1_24',text:'Предлоги движения: to, into, out of, up, down, along, across, through',note:'go to school, walk into the room, run across the street',
exp:`<br>• <em>to</em> = направление к точке: <em>go to work, walk to the park</em>
<br>• <em>into</em> = движение внутрь: <em>come into the room, jump into the pool</em>
<br>• <em>out of</em> = движение наружу: <em>get out of the car, take out of the bag</em>
<br>• <em>up/down</em> = вверх/вниз: <em>climb up the hill, walk down the stairs</em>
<br>• <em>along</em> = вдоль: <em>walk along the river</em>
<br>• <em>across</em> = поперёк/через: <em>swim across the lake, walk across the road</em>
<br>• <em>through</em> = сквозь: <em>drive through the tunnel</em>`,
ex:[['She walked into the room.','Она вошла в комнату.'],['He ran across the street.','Он перебежал улицу.'],['We drove through the forest.','Мы проехали через лес.']],
links:[['Prepositions of movement','https://www.perfect-english-grammar.com/prepositions-of-movement.html',EN],['native-english.ru: предлоги движения','https://www.native-english.ru/grammar/prepositions-meaning',RU]]},
]}
]},

{id:'A2',name:'A2 — Элементарный',sub:'Elementary · 3–4 месяца',color:'var(--a2)',colorBg:'var(--a2bg)',
categories:[
{name:'Past Simple',rules:[
{id:'a2_01',text:'Past Simple — правильные глаголы: +ed',note:'work→worked, play→played, stop→stopped, study→studied',
exp:`<strong>Past Simple</strong> — завершённое действие в прошлом с конкретным временем или без.
<br><br>Правила написания окончания <em>-ed</em>:
<br>• Большинство глаголов: + <em>ed</em> → <em>worked, played</em>
<br>• Оканчиваются на -e: + <em>d</em> → <em>loved, used</em>
<br>• Согласная + -y: -y → <em>ied</em> → <em>studied, tried</em>
<br>• Одна гласная + одна согласная (краткий ударный слог): удвоить согласную → <em>stopped, planned</em>`,
ex:[['She worked all day yesterday.','Она работала весь день вчера.'],['They played tennis last Sunday.','Они играли в теннис в прошлое воскресенье.']],
tip:'Маркеры: yesterday, last week/year, ago, in 2010, at 5 o\'clock.',
links:[['OK English: Past Simple (видео)','https://ok-english.ru/video-free/',YT],['engfairy: упражнения','https://engfairy.com/past-simple-tense-uprazhneniya/',RU],['Perfect English Grammar','https://www.perfect-english-grammar.com/past-simple.html',EN],['native-english.ru: Past Simple','https://www.native-english.ru/grammar/past-simple',RU]]},

{id:'a2_02',text:'Past Simple — неправильные глаголы (таблица)',note:'go→went, see→saw, have→had, come→came, buy→bought',
exp:`Около 200 неправильных глаголов нужно учить наизусть. Самые частотные 50 покрывают ~90% употреблений.
<br><br>Группы по схожести изменений:
<br>• AAA (не меняются): <em>cut, put, hit, set, let</em>
<br>• ABA (возврат к началу): <em>run→ran→run, come→came→come</em>
<br>• ABC (все разные): <em>go→went→gone, be→was/were→been</em>`,
ex:[['I went to Paris last summer.','Я ездил в Париж прошлым летом.'],['She saw a great film.','Она посмотрела отличный фильм.'],['We had a meeting at 9.','У нас была встреча в 9.']],
links:[['Таблица неправильных глаголов','https://www.perfect-english-grammar.com/irregular-verbs.html',EN],['Skyeng упражнения','https://skyeng.ru/exercises/past-simple/',RU],['native-english.ru: неправильные глаголы','https://www.native-english.ru/grammar/irregular-verbs',RU]]},

{id:'a2_03',text:"Past Simple — отрицание: didn't + инфинитив",note:"She didn't go (не: didn't went). I didn't see him.",
exp:`Отрицание: <em>didn't</em> (= did not) + инфинитив для <strong>всех лиц</strong>.
<br>⚠️ После <em>didn't</em> — <strong>базовая форма</strong> глагола (не прошедшее время!): <em>She didn't go</em> (не ~~went~~).`,
ex:[["I didn't see him yesterday.","Я не видел его вчера."],["She didn't come to work.","Она не пришла на работу."]],
links:[['Упражнения на отрицание','https://www.perfect-english-grammar.com/past-simple-exercise-3.html',EN],['native-english.ru: Past Simple','https://www.native-english.ru/grammar/past-simple',RU]]},

{id:'a2_04',text:'Past Simple — вопросы: Did you? Where did she go?',note:'Did they arrive? What did he say?',
exp:`Вопрос: <em>Did + подлежащее + инфинитив?</em>
<br>Специальные вопросы: <em>Where/When/What + did + подлежащее + инфинитив?</em>
<br><br>⚠️ Исключение: вопрос «Кто совершил действие?» строится без did: <em>Who called? Who broke the vase?</em>`,
ex:[['Did you enjoy the film?','Тебе понравился фильм?'],['Where did they go?','Куда они пошли?'],['Who told you that?','Кто тебе это сказал?']],
links:[['Вопросы в Past Simple','https://www.perfect-english-grammar.com/past-simple-exercise-5.html',EN],['native-english.ru: Past Simple','https://www.native-english.ru/grammar/past-simple',RU]]},

{id:'a2_05',text:'was / were — глагол to be в прошлом',note:'I/he/she/it was. You/we/they were.',
exp:`Прошедшее время глагола <em>to be</em>:
<br>• <em>was</em> — с I, he, she, it
<br>• <em>were</em> — с you, we, they
<br><br>Отрицание: <em>wasn't / weren't</em>
<br>Вопрос: <em>Was she...? Were they...?</em>`,
ex:[['I was very tired last night.','Я был очень уставшим вчера вечером.'],['They were at home all day.','Они были дома весь день.'],['Was it expensive?','Это было дорого?']],
links:[['was/were упражнения','https://www.perfect-english-grammar.com/was-or-were-exercise.html',EN],['native-english.ru: глагол to be','https://www.native-english.ru/grammar/verb-to-be',RU]]},
]},

{name:'Future',rules:[
{id:'a2_06',text:'will — предсказания и спонтанные решения',note:"I'll call you back. It will rain tomorrow. I'll have the pasta.",
exp:`<em>will</em> используется для:
<br>1. <strong>Спонтанных решений</strong> (принятых в момент речи): <em>I'll help you with that.</em>
<br>2. <strong>Предсказаний</strong> без конкретного плана: <em>I think it will rain.</em>
<br>3. <strong>Обещаний</strong>: <em>I won't tell anyone.</em>
<br>4. <strong>Просьб</strong>: <em>Will you open the window?</em>
<br><br>Сокращение: <em>'ll</em>. Отрицание: <em>won't</em> (= will not).`,
ex:[["The phone is ringing. — I'll get it!",'Телефон звонит. — Я отвечу!'],['It will be cold tomorrow.','Завтра будет холодно.']],
links:[['OK English: will (видео)','https://ok-english.ru/video-free/',YT],['Will future','https://www.perfect-english-grammar.com/will-future.html',EN],['native-english.ru: shall/will','https://www.native-english.ru/grammar/modal-verb-shall-will',RU]]},

{id:'a2_07',text:'going to — намерения и очевидные предсказания',note:"I'm going to visit Paris. Look out — you're going to fall!",
exp:`<em>going to</em> используется для:
<br>1. <strong>Заранее принятых решений и намерений</strong>: <em>I'm going to start a diet next week.</em>
<br>2. <strong>Предсказаний с видимыми признаками</strong>: <em>Look at those clouds — it's going to rain!</em>
<br><br>Форма: <em>am/is/are + going to + инфинитив</em>`,
ex:[["I'm going to study medicine.",'Я собираюсь изучать медицину.'],["She's going to have a baby.",'Она ждёт ребёнка.']],
exc:'<em>will vs going to</em>: <em>"I\'ll have coffee"</em> — решаю прямо сейчас; <em>"I\'m going to have coffee"</em> — уже решил раньше.',
links:[['Will vs going to','https://www.perfect-english-grammar.com/will-or-going-to.html',EN],['Skyeng: упражнения','https://skyeng.ru/exercises/future/',RU],['native-english.ru: Future Simple','https://www.native-english.ru/grammar/future-simple',RU]]},
]},

{name:'Present Continuous',rules:[
{id:'a2_08',text:'Present Continuous: am/is/are + V-ing',note:'She is reading now. They are playing outside.',
exp:`<strong>Present Continuous</strong> — действие, происходящее <strong>прямо сейчас</strong> или <strong>временно</strong> в этот период.
<br><br>Форма: <em>am/is/are + глагол + -ing</em>
<br><br>Правила написания <em>-ing</em>:
<br>• Большинство: просто + <em>ing</em> → <em>working, playing</em>
<br>• Оканчивается на -e: убрать -e + <em>ing</em> → <em>making, coming</em>
<br>• Краткий ударный слог: удвоить последнюю согласную → <em>running, sitting</em>`,
ex:[['I am studying English right now.','Я сейчас изучаю английский.'],["She's working from home this month.",'Она работает из дома в этом месяце.']],
tip:'Маркеры: now, at the moment, currently, this week/month.',
links:[['OK English: Present Continuous (видео)','https://ok-english.ru/video-free/',YT],['Skyeng упражнения','https://skyeng.ru/exercises/present-continuous/',RU],['Perfect English Grammar','https://www.perfect-english-grammar.com/present-continuous.html',EN],['native-english.ru: Present Continuous','https://www.native-english.ru/grammar/present-continuous',RU]]},

{id:'a2_09',text:'Present Continuous для запланированного будущего',note:"I'm meeting Tom tomorrow. We're flying to Rome on Friday.",
exp:`Present Continuous используется для <strong>конкретных договорённостей</strong> в будущем — когда время и место уже определены.
<br><br>Разница:
<br>• <em>I'm meeting Alice tomorrow</em> — встреча договорена (конкретный план)
<br>• <em>I'll meet Alice tomorrow</em> — намерение или предложение`,
ex:[["I'm having dinner with Alex tonight.",'Я ужинаю с Алексом сегодня вечером.'],["They're getting married in June.",'Они женятся в июне.']],
links:[['Present Continuous for future','https://www.perfect-english-grammar.com/present-continuous-for-future.html',EN],['native-english.ru: Present Continuous','https://www.native-english.ru/grammar/present-continuous',RU]]},

{id:'a2_10',text:'Present Simple vs Present Continuous — разница',note:'I drink coffee (привычка) vs I am drinking coffee (прямо сейчас)',
exp:`<strong>Present Simple:</strong> привычки, факты, расписания, общие истины.
<br><strong>Present Continuous:</strong> то, что происходит прямо сейчас или временно.
<br><br>Сравни:
<br>• <em>She speaks French.</em> — знает язык (всегда)
<br>• <em>She is speaking French.</em> — говорит прямо сейчас
<br><br>⚠️ Stative verbs (know, love, want, understand...) — только Present Simple!`,
ex:[['Water boils at 100°C. (факт)','Вода кипит при 100°C.'],["I'm reading a great book this week. (временно)",'Я читаю отличную книгу на этой неделе.']],
links:[['Simple vs Continuous','https://www.perfect-english-grammar.com/present-simple-or-present-continuous.html',EN],['Skyeng упражнения','https://skyeng.ru/exercises/present-simple-vs-present-continuous/',RU],['native-english.ru: Present Simple vs Continuous','https://www.native-english.ru/grammar/present-simple',RU]]},
]},

{name:'Модальные глаголы',rules:[
{id:'a2_11',text:'should / shouldn\'t — совет и рекомендация',note:'You should see a doctor. You shouldn\'t eat so much.',
exp:`<em>should</em> выражает мягкий совет или личное мнение. Слабее <em>must</em>.
<br>После <em>should</em> — инфинитив без <em>to</em>.
<br><br>Также используется для критики или сожаления: <em>You should have called</em> (надо было позвонить).`,
ex:[['You should exercise more.','Тебе стоит больше заниматься спортом.'],["She shouldn't work so hard.",'Ей не следует так много работать.']],
links:[['Should','https://www.perfect-english-grammar.com/should.html',EN],['native-english.ru: should','https://www.native-english.ru/grammar/modal-verb-should',RU]]},

{id:'a2_12',text:'must / mustn\'t — обязанность и строгий запрет',note:'You must wear a seatbelt. You mustn\'t smoke here.',
exp:`<em>must</em> — сильная обязанность (часто внутренняя) или категорическое требование.
<br><em>mustn't</em> — строгий <strong>запрет</strong> (категорически нельзя!).
<br><br>⚠️ Важное отличие: <em>mustn't</em> ≠ <em>don't have to</em>!
<br>• <em>mustn't</em> = запрещено
<br>• <em>don't have to</em> = не обязательно, но можно`,
ex:[['You must show your passport.','Вы должны предъявить паспорт.'],['You mustn\'t smoke here.','Здесь нельзя курить.']],
links:[['Must','https://www.perfect-english-grammar.com/must.html',EN],['native-english.ru: must','https://www.native-english.ru/grammar/modal-verb-must',RU]]},

{id:'a2_13',text:'have to — внешняя необходимость',note:"I have to work late. She doesn't have to come.",
exp:`<em>have to</em> — необходимость из-за внешних правил, обстоятельств или чужих требований.
<br><br>Отличие от <em>must</em>:
<br>• <em>must</em> — внутренняя необходимость: <em>I must call her</em> (я сам считаю нужным)
<br>• <em>have to</em> — внешняя: <em>I have to wear a uniform</em> (правило)
<br><br><em>don't have to</em> = не обязательно (нет необходимости, но разрешено).`,
ex:[["I have to finish this report by Friday.",'Я должен сдать отчёт к пятнице.'],["You don't have to come if you don't want to.",'Тебе не обязательно приходить.']],
links:[['Must or have to','https://www.perfect-english-grammar.com/must-or-have-to.html',EN],['native-english.ru: have to','https://www.native-english.ru/grammar/modal-verb-have-to',RU]]},

{id:'a2_14',text:'could — прошлое умение и вежливые просьбы',note:'She could swim when she was 5. Could you help me?',
exp:`<em>could</em> — прошедшее время от <em>can</em>. Два основных значения:
<br>1. <strong>Умение в прошлом</strong>: <em>I could read at 4 years old.</em>
<br>2. <strong>Вежливые просьбы</strong> (вежливее <em>can</em>): <em>Could you pass the salt, please?</em>
<br><br>Также для возможности в настоящем: <em>It could be true.</em>`,
ex:[['She could play the violin as a child.','Она умела играть на скрипке в детстве.'],['Could you speak more slowly, please?','Не могли бы вы говорить помедленнее?']],
links:[['Could','https://www.perfect-english-grammar.com/could.html',EN],['native-english.ru: can/could','https://www.native-english.ru/grammar/modal-verb-can',RU]]},
]},

{name:'Прилагательные и количество',rules:[
{id:'a2_15',text:'Сравнительная степень прилагательных',note:'bigger, more interesting, better, worse',
exp:`Односложные и двусложные на <em>-y</em>: + <em>er</em> (fast→faster, happy→happier).
<br>Многосложные: <em>more</em> + прилагательное.
<br><br>Правила написания: <em>-e</em> → + <em>r</em> (nice→nicer); краткий ударный слог: удвоить (big→bigger); -y → ier (heavy→heavier).
<br><br>Неправильные: <em>good→better, bad→worse, far→further/farther, much/many→more</em>
<br>После сравнительной — <em>than</em>: <em>She is taller than her sister.</em>`,
ex:[['This film is more interesting than that one.','Этот фильм интереснее того.'],['Today is worse than yesterday.','Сегодня хуже, чем вчера.']],
links:[['Comparatives','https://www.perfect-english-grammar.com/comparatives.html',EN],['Skyeng упражнения','https://skyeng.ru/exercises/degrees-of-comparison/',RU],['native-english.ru: степени сравнения','https://www.native-english.ru/grammar/adjectives-degrees-of-comparison',RU]]},

{id:'a2_16',text:'Превосходная степень прилагательных',note:'the biggest, the most beautiful, the best',
exp:`Односложные: <em>the + -est</em>. Многосложные: <em>the most</em>.
<br>Правила написания те же, что и у сравнительной степени.
<br><br>Неправильные: <em>good→the best, bad→the worst, far→the furthest, much/many→the most</em>
<br><br>⚠️ Всегда с артиклем <em>the</em>! После превосходной степени часто <em>in</em> или <em>of</em>: <em>the tallest girl in the class.</em>`,
ex:[['This is the most expensive restaurant in the city.','Это самый дорогой ресторан в городе.'],['He is the best player on the team.','Он лучший игрок в команде.']],
links:[['Superlatives','https://www.perfect-english-grammar.com/superlatives.html',EN],['native-english.ru: степени сравнения','https://www.native-english.ru/grammar/adjectives-degrees-of-comparison',RU]]},

{id:'a2_17',text:'some / any — неопределённое количество',note:'I have some money. Do you have any? I don\'t have any.',
exp:`<em>some</em> — в утвердительных предложениях и в предложениях/просьбах.
<br><em>any</em> — в вопросах и отрицаниях.
<br><br>Исключение: <em>some</em> в вопросах, когда ожидаем утвердительный ответ или предлагаем что-то: <em>Would you like some tea? Can I have some water?</em>`,
ex:[["I bought some bread and some milk.",'Я купил хлеба и молока.'],["Is there any milk in the fridge?",'В холодильнике есть молоко?'],["I don't have any cash on me.",'У меня нет наличных с собой.']],
links:[['Some or any','https://www.perfect-english-grammar.com/some-or-any.html',EN],['native-english.ru: неопределённые местоимения','https://www.native-english.ru/grammar/indefinite-pronouns',RU]]},

{id:'a2_18',text:'much / many / a lot of / a few / a little',note:'much water (несчисл.), many people (счисл.), a lot of — везде',
exp:`<em>much</em> — с несчисляемыми (much water, much time, much money).
<br><em>many</em> — со счисляемыми (many people, many books, many times).
<br><em>a lot of / lots of</em> — с обоими, разговорный стиль.
<br><br><em>a few</em> — немного (счисляемые, нейтрально/позитивно).
<br><em>few</em> — мало, почти нет (счисляемые, негативно).
<br><em>a little</em> — немного (несчисляемые, нейтрально).
<br><em>little</em> — мало, почти нет (несчисляемые, негативно).`,
ex:[["I don't have much time.",'У меня мало времени.'],['She has a few friends in London.','У неё есть несколько друзей в Лондоне.'],['There is a little sugar left.','Осталось немного сахара.']],
links:[['Much/many/a lot of','https://www.perfect-english-grammar.com/much-or-many.html',EN],['native-english.ru: наречия меры','https://www.native-english.ru/grammar/adverb-of-degree',RU]]},

{id:'a2_19',text:'Счисляемые и несчисляемые существительные',note:'water, information, advice — нельзя: a water, two advices',
exp:`<strong>Счисляемые</strong>: можно посчитать, есть мн. число: <em>a book, two books</em>.
<br><strong>Несчисляемые</strong>: нельзя посчитать напрямую — нет мн. числа, нет неопределённого артикля.
<br><br>Типичные несчисляемые: <em>water, milk, bread, rice, money, information, advice, news, weather, luggage, furniture, hair, music, work</em>
<br><br>Для обозначения порций: <em>a glass of water, a piece of advice, a loaf of bread, a bag of rice</em>`,
ex:[["Can I have some information, please?",'Можно мне узнать кое-что?'],['She gave me very useful advice.','Она дала мне очень полезный совет.']],
links:[['Countable/uncountable','https://www.perfect-english-grammar.com/countable-and-uncountable-nouns.html',EN],['Skyeng упражнения','https://skyeng.ru/exercises/nouns/',RU],['native-english.ru: существительные','https://www.native-english.ru/grammar/english-nouns',RU]]},
]},

{name:'Предлоги времени',rules:[
{id:'a2_20',text:'Предлоги in / on / at для времени',note:'in March, in 2024, in winter; on Monday, on 5 June; at 3pm, at night',
exp:`<em>at</em> → точное время: <em>at 6 o'clock, at noon, at midnight, at night, at the weekend (BrE)</em>
<br><em>on</em> → дни и даты: <em>on Monday, on 5 March, on my birthday, on New Year's Day</em>
<br><em>in</em> → периоды: <em>in July, in 2023, in the morning/afternoon/evening, in summer, in the 21st century</em>
<br><br>Без предлога: <em>this/last/next + время: this morning, last week, next year</em>`,
ex:[["The meeting is at half past three.",'Встреча в половине четвёртого.'],['She was born on the 12th of April.','Она родилась 12 апреля.'],['I started this job in October.','Я начал эту работу в октябре.']],
links:[['In/On/At time','https://www.perfect-english-grammar.com/in-on-at-time.html',EN],['native-english.ru: предлог at','https://www.native-english.ru/grammar/preposition-at',RU]]},

{id:'a2_21',text:'for / since / ago — продолжительность и начало',note:'for three years, since 2020, three years ago',
exp:`<em>for</em> — продолжительность (как долго): <em>for two hours, for a week, for years</em>. Используется с разными временами.
<br><em>since</em> — начальный момент (с тех пор как): <em>since Monday, since 2019, since I was a child</em>. Используется с Present Perfect.
<br><em>ago</em> — время назад от сейчас: <em>three days ago, a month ago</em>. Только с Past Simple.`,
ex:[[`I've been here for six months.`,'Я здесь уже шесть месяцев.'],["She's worked here since 2020.",'Она работает здесь с 2020 года.'],['I saw him two days ago.','Я видел его два дня назад.']],
links:[['For/since/ago','https://www.perfect-english-grammar.com/for-since-and-ago.html',EN],['native-english.ru: предлог for','https://www.native-english.ru/grammar/preposition-for',RU]]},
]},

{name:'Разное A2',rules:[
{id:'a2_22',text:'Вопросы-хвостики: ...isn\'t it? / ...do you? / ...haven\'t they?',note:'It\'s cold, isn\'t it? You like jazz, don\'t you?',
exp:`Вопросы-хвостики (tag questions) используются для подтверждения или уточнения.
<br><br>Правило: утвердительное предложение → отрицательный хвостик, и наоборот.
<br>Вспомогательный глагол в хвостике = время основного предложения.
<br><br>Интонация: ↘ (понижающаяся) = подтверждение; ↗ (повышающаяся) = реальный вопрос.`,
ex:[["It's a nice day, isn't it?",'Хороший день, правда?'],["You don't like horror films, do you?",'Ты же не любишь фильмы ужасов, правда?'],["She can swim, can't she?",'Она умеет плавать, не так ли?']],
links:[['Tag questions','https://www.perfect-english-grammar.com/tag-questions.html',EN],['Упражнения','https://skyeng.ru/exercises/tag-questions/',RU],['native-english.ru: общие вопросы','https://www.native-english.ru/grammar/general-questions',RU]]},
]},

{name:'Глагол have / have got',rules:[
{id:'a2_23',text:'have got — обладание (британский вариант)',note:'I\'ve got a car. Have you got a pen? She hasn\'t got time.',
exp:`<em>have got</em> — разговорная британская форма для обозначения обладания. Значение = <em>have</em>.
<br><br>• Утверждение: <em>I have got / I've got a laptop.</em>
<br>• Отрицание: <em>I haven't got / I don't have</em>
<br>• Вопрос: <em>Have you got...? / Do you have...?</em>
<br><br>⚠️ <em>have got</em> используется только в настоящем. Для прошлого — только <em>had</em> (не <em>had got</em> в американском).`,
ex:[["I've got two brothers.",'У меня два брата.'],["Have you got the time?",'Ты не знаешь, который час?'],["She hasn't got any cash.",'У неё нет наличных.']],
links:[['Have or have got','https://www.perfect-english-grammar.com/have-or-have-got.html',EN],['native-english.ru: глагол to have','https://www.native-english.ru/grammar/verb-to-have',RU]]},
]},

{name:'Наречия',rules:[
{id:'a2_24',text:'Наречия образа действия: quickly, carefully, well, hard, fast',note:'She sings beautifully. He works hard. She drives fast.',
exp:`Большинство наречий образуется из прилагательных + <em>-ly</em>: <em>quick → quickly, careful → carefully, slow → slowly</em>.
<br><br>Особые случаи:
<br>• <em>good → well</em> (не ~~goodly~~)
<br>• <em>fast → fast</em> (не ~~fastly~~)
<br>• <em>hard → hard</em> (не ~~hardly~~ — это другое слово: «едва»)
<br>• <em>late → late</em> (не ~~lately~~ — это «в последнее время»)
<br><br>Место: обычно после глагола/дополнения: <em>She speaks English well.</em>`,
ex:[['He explained it clearly.','Он объяснил это ясно.'],['She ran fast.','Она бежала быстро.'],['They worked hard all day.','Они много работали весь день.']],
links:[['Adverbs of manner','https://www.perfect-english-grammar.com/adverbs.html',EN],['native-english.ru: наречия образа действия','https://www.native-english.ru/grammar/adverbs-of-manner',RU]]},

{id:'a2_25',text:'Наречия частотности и их место в предложении',note:'always, usually, often, sometimes, rarely, never — перед главным глаголом',
exp:`Наречия частотности: <em>always, usually, often, sometimes, occasionally, rarely, seldom, never</em>.
<br><br>Место в предложении:
<br>• Перед основным глаголом: <em>She always drinks tea.</em>
<br>• После глагола <em>to be</em>: <em>He is always late.</em>
<br>• После вспомогательного глагола: <em>She has never been to Italy.</em>
<br><br>Также: <em>every day/week, once a week, twice a month</em> — в конце предложения.`,
ex:[['I usually wake up at 7.','Я обычно просыпаюсь в 7.'],['She is never late for work.','Она никогда не опаздывает на работу.'],['They meet once a week.','Они встречаются раз в неделю.']],
links:[['Adverb position','https://www.perfect-english-grammar.com/adverb-position.html',EN],['native-english.ru: место наречия','https://www.native-english.ru/grammar/position-of-adverbs',RU]]},
]},

{name:'Порядок прилагательных',rules:[
{id:'a2_26',text:'Порядок прилагательных перед существительным',note:'a lovely small old red Italian leather bag',
exp:`Когда несколько прилагательных стоят перед существительным, соблюдается строгий порядок:
<br><br><strong>Opinion → Size → Age → Shape → Colour → Origin → Material → Purpose</strong>
<br>(Мнение → Размер → Возраст → Форма → Цвет → Происхождение → Материал → Назначение)
<br><br>Пример: <em>a beautiful small old square brown French wooden writing desk</em>`,
ex:[['a lovely little old cottage','прелестный маленький старый коттедж'],['a big red Italian sports car','большой красный итальянский спортивный автомобиль']],
links:[['Adjective order','https://www.perfect-english-grammar.com/order-of-adjectives.html',EN],['native-english.ru: порядок прилагательных','https://www.native-english.ru/grammar/adjectives-order',RU]]},
]}
]},

{id:'B1',name:'B1 — Средний',sub:'Intermediate · 4–6 месяцев',color:'var(--b1)',colorBg:'var(--b1bg)',
categories:[
{name:'Present Perfect',rules:[
{id:'b1_01',text:'Present Perfect — форма и значение',note:'I have seen it. She has gone. They have arrived.',
exp:`<strong>Present Perfect</strong> = have/has + V3 (третья форма глагола).
<br><br>Три основных значения:
<br>1. <strong>Жизненный опыт</strong> (без указания времени): <em>I have visited Tokyo.</em>
<br>2. <strong>Результат в настоящем</strong>: <em>I have lost my keys.</em> (сейчас нет ключей)
<br>3. <strong>Незавершённое действие</strong>, продолжающееся сейчас: <em>She has lived here for 5 years.</em>
<br><br>V3 правильных глаголов = Past Simple (worked, played). Неправильные нужно знать отдельно.`,
ex:[['Have you ever eaten sushi?','Ты когда-нибудь ел суши?'],["I've just finished my homework.",'Я только что закончил домашнее задание.'],["She hasn't called yet.",'Она ещё не позвонила.']],
tip:'Маркеры: ever, never, already, yet, just, recently, lately, so far.',
links:[['OK English: Present Perfect (видео)','https://ok-english.ru/video-free/',YT],['Skyeng: упражнения PP','https://skyeng.ru/exercises/present-perfect-present-perfect-continuous/',RU],['Perfect English Grammar','https://www.perfect-english-grammar.com/present-perfect.html',EN],['native-english.ru: Present Perfect','https://www.native-english.ru/grammar/present-perfect',RU]]},

{id:'b1_02',text:'ever / never / already / yet / just — маркеры Present Perfect',note:'Have you ever...? I\'ve never... I\'ve already... Not yet. I\'ve just...',
exp:`<em>ever</em> — когда-нибудь (в вопросах об опыте). Место: перед V3.
<br><em>never</em> — никогда (отрицательное значение). Место: перед V3.
<br><em>already</em> — уже (раньше ожидаемого). Место: перед V3 или в конце.
<br><em>yet</em> — уже/ещё. В вопросах (Have you finished yet?) и отрицаниях (I haven't finished yet). Место: конец предложения.
<br><em>just</em> — только что. Место: перед V3.`,
ex:[['Have you ever been to Scotland?','Ты бывал в Шотландии?'],["I've never eaten snails.",'Я никогда не ел улиток.'],["I've already seen that film.",'Я уже видел этот фильм.'],["She hasn't replied yet.",'Она ещё не ответила.']],
links:[['already/yet/just','https://www.perfect-english-grammar.com/present-perfect-already-yet-just.html',EN],['native-english.ru: Present Perfect','https://www.native-english.ru/grammar/present-perfect',RU]]},

{id:'b1_03',text:'Present Perfect vs Past Simple — ключевая разница',note:'I\'ve been to Paris (опыт) vs I went to Paris in 2019 (конкретное время)',
exp:`Это одна из самых важных разниц в английской грамматике.
<br><br><strong>Present Perfect</strong> — связь с настоящим, время НЕ указывается:
<br><em>I've lost my wallet.</em> (сейчас нет кошелька — это важно)
<br><br><strong>Past Simple</strong> — завершённое прошлое, время указывается или подразумевается:
<br><em>I lost my wallet yesterday.</em> (вчера — конкретное время)
<br><br>⚠️ С конкретными временными маркерами (yesterday, last week, in 2020, ago) → только Past Simple!`,
ex:[["I've met the new director. (он сейчас здесь, это актуально)",'Я познакомился с новым директором.'],["I met him last Tuesday. (конкретное время)",'Я встретил его в прошлый вторник.']],
links:[['OK English: PP vs Past Simple (видео)','https://ok-english.ru/video-free/',YT],['Skyeng: тест PP vs PS','https://skyeng.ru/testy-po-anglijskomu-yazyku/past-simple-ili-present-perfect/',RU],['Perfect English Grammar','https://www.perfect-english-grammar.com/present-perfect-or-past-simple.html',EN],['native-english.ru: Present Perfect','https://www.native-english.ru/grammar/present-perfect',RU]]},

{id:'b1_04',text:'Present Perfect с for и since',note:'I\'ve lived here for 5 years / since 2019.',
exp:`<em>for</em> — продолжительность: <em>for two days, for a year, for a long time, for ages</em>
<br><em>since</em> — начальная точка: <em>since Monday, since I was a child, since 2015</em>
<br><br>Вопрос «Как долго?» — How long + Present Perfect: <em>How long have you known her?</em>`,
ex:[["She's worked here for ten years.",'Она работает здесь десять лет.'],["I've known him since university.",'Я знаю его со времён университета.']],
links:[['For and since','https://www.perfect-english-grammar.com/present-perfect-with-for-and-since.html',EN],['native-english.ru: Present Perfect','https://www.native-english.ru/grammar/present-perfect',RU]]},

{id:'b1_05',text:'Present Perfect Continuous: have been + V-ing',note:'I have been waiting for an hour. She has been studying all day.',
exp:`<strong>Present Perfect Continuous</strong> = have/has been + V-ing
<br><br>Акцент на <strong>продолжительности</strong> или незавершённости действия. Отвечает на вопрос «Как долго?»
<br>Часто объясняет видимый результат в настоящем: <em>You look tired — have you been running?</em>
<br><br>Разница с Present Perfect Simple:
<br>• <em>I've read 50 pages.</em> — результат, завершённость
<br>• <em>I've been reading all evening.</em> — акцент на процессе`,
ex:[["I've been learning English for two years.",'Я учу английский уже два года.'],['Why are your hands dirty? — I\'ve been fixing the car.','Почему у тебя грязные руки? — Чинил машину.']],
links:[['OK English: PPC (видео)','https://ok-english.ru/video-free/',YT],['Perfect English Grammar','https://www.perfect-english-grammar.com/present-perfect-continuous.html',EN],['native-english.ru: Present Perfect Continuous','https://www.native-english.ru/grammar/present-perfect-continuous',RU]]},
]},

{name:'Прошедшие времена',rules:[
{id:'b1_06',text:'Past Continuous: was/were + V-ing',note:'I was reading at 8pm. They were talking all evening.',
exp:`<strong>Past Continuous</strong> = was/were + V-ing
<br><br>Значения:
<br>1. Действие в <strong>процессе</strong> в конкретный момент прошлого: <em>At 9pm I was having dinner.</em>
<br>2. <strong>Фоновое действие</strong>, прерванное другим: <em>I was walking when it started to rain.</em>
<br>3. Параллельные действия: <em>While she was cooking, he was watching TV.</em>`,
ex:[['It was raining when I left home.','Когда я выходил из дома, шёл дождь.'],['What were you doing at 7 yesterday?','Что ты делал вчера в 7?']],
links:[['OK English: Past Continuous (видео)','https://ok-english.ru/video-free/',YT],['Perfect English Grammar','https://www.perfect-english-grammar.com/past-continuous.html',EN],['native-english.ru: Past Continuous','https://www.native-english.ru/grammar/past-continuous',RU]]},

{id:'b1_07',text:'Past Simple vs Past Continuous — фон и событие',note:'While I was cooking, he called. I was walking when it started to rain.',
exp:`Типичная конструкция: длинное фоновое действие (Past Continuous) + короткое событие (Past Simple).
<br><br>Союзы:
<br>• <em>when</em> — используется с Past Simple для события: <em>She was sleeping when the alarm went off.</em>
<br>• <em>while/as</em> — используется с Past Continuous для фона: <em>While I was watching TV, the power went out.</em>`,
ex:[['She was having a bath when the phone rang.','Она принимала ванну, когда зазвонил телефон.'],['While he was giving his speech, someone fell asleep.','Пока он произносил речь, кто-то заснул.']],
links:[['Past Simple vs Continuous','https://www.perfect-english-grammar.com/past-simple-or-past-continuous.html',EN],['native-english.ru: Past Continuous','https://www.native-english.ru/grammar/past-continuous',RU]]},
]},

{name:'Условные предложения',rules:[
{id:'b1_08',text:'0-й тип: If + Present, Present — факты и законы',note:'If you heat water to 100°C, it boils.',
exp:`Нулевой тип — для научных фактов, законов природы, общих истин. Оба действия всегда происходят вместе.
<br><br>Форма: <em>If + Present Simple, Present Simple</em>
<br>Вместо <em>if</em> можно <em>when</em>: <em>When you mix red and blue, you get purple.</em>`,
ex:[['If you heat ice, it melts.','Если нагреть лёд, он тает.'],["If it rains, the streets get wet.",'Если идёт дождь, улицы намокают.']],
links:[['Conditionals overview','https://www.perfect-english-grammar.com/conditionals.html',EN],['Skyeng: условные предложения','https://skyeng.ru/exercises/conditionals/',RU],['native-english.ru: условные предложения','https://www.native-english.ru/grammar/conditional-sentences',RU]]},

{id:'b1_09',text:'1-й тип: If + Present Simple, will — реальное будущее',note:'If it rains tomorrow, I\'ll stay home.',
exp:`Реальная, вероятная ситуация в будущем.
<br><br>Форма: <em>If + Present Simple, will + инфинитив</em>
<br>⚠️ В <em>if</em>-части — НИКОГДА не Future! Только Present Simple.
<br><br>Вместо <em>will</em> в главной части можно: <em>can, may, might, should</em>.
<br>Части можно поменять: <em>I'll stay home if it rains.</em> (без запятой)`,
ex:[["If she studies hard, she'll pass the exam.",'Если она будет хорошо учиться, она сдаст экзамен.'],["If you need help, I can come.",'Если нужна помощь, я могу прийти.']],
links:[['OK English: 1st conditional (видео)','https://ok-english.ru/video-free/',YT],['First conditional','https://www.perfect-english-grammar.com/first-conditional.html',EN],['native-english.ru: условные предложения','https://www.native-english.ru/grammar/conditional-sentences',RU]]},

{id:'b1_10',text:'2-й тип: If + Past Simple, would — нереальное настоящее',note:'If I had a car, I would drive to work. If I were you...',
exp:`Нереальная или маловероятная ситуация в настоящем или будущем.
<br><br>Форма: <em>If + Past Simple, would + инфинитив</em>
<br>⚠️ Глагол в <em>if</em>-части — Past Simple, но значение — <strong>настоящее/будущее</strong>!
<br>⚠️ <em>were</em> используется для всех лиц: <em>If I were you, If she were here</em> — это стандарт формального языка.`,
ex:[['If I won the lottery, I would travel the world.','Если бы я выиграл в лотерею, я бы объездил мир.'],["If I were taller, I'd play basketball.",'Если бы я был выше, я бы играл в баскетбол.']],
links:[['OK English: 2nd conditional (видео)','https://ok-english.ru/video-free/',YT],['Second conditional','https://www.perfect-english-grammar.com/second-conditional.html',EN],['native-english.ru: условные предложения','https://www.native-english.ru/grammar/conditional-sentences',RU]]},

{id:'b1_11',text:'1-й тип vs 2-й тип: реальное vs маловероятное',note:'If I win (1st, реально) vs If I won (2nd, вряд ли)',
exp:`Выбор типа отражает <strong>твою уверенность</strong> в реальности ситуации.
<br><br>• <em>If I see her</em> (1-й тип) — я ожидаю её увидеть
<br>• <em>If I saw her</em> (2-й тип) — маловероятно или я просто фантазирую
<br><br>Это не разница в грамматике, а разница в отношении говорящего.`,
ex:[["If it rains tomorrow, I'll take an umbrella. (реально возможно)",'Если завтра будет дождь, я возьму зонт.'],["If it rained every day, I'd move to Spain. (маловероятная фантазия)",'Если бы шёл дождь каждый день, я переехал бы в Испанию.']],
links:[['1st vs 2nd conditional','https://www.perfect-english-grammar.com/first-or-second-conditional.html',EN],['native-english.ru: условные предложения','https://www.native-english.ru/grammar/conditional-sentences',RU]]},
]},

{name:'Страдательный залог (Passive)',rules:[
{id:'b1_12',text:'Passive Voice — Present Simple: is/are + V3',note:'Coffee is grown in Brazil. The car is made in Germany.',
exp:`<strong>Страдательный залог</strong> используется, когда:
<br>• Важно само действие, а не тот, кто его совершает
<br>• Исполнитель неизвестен или очевиден
<br><br>Форма Present Simple Passive: <em>am/is/are + V3</em>
<br>Исполнитель (если нужен) добавляется с <em>by</em>: <em>The window was broken by the ball.</em>`,
ex:[['English is spoken in many countries.','На английском говорят во многих странах.'],['The letter is written in French.','Письмо написано по-французски.']],
links:[['OK English: Passive Voice (видео)','https://ok-english.ru/video-free/',YT],['Passive Voice overview','https://www.perfect-english-grammar.com/passive.html',EN],['Skyeng упражнения','https://skyeng.ru/exercises/passive/',RU],['native-english.ru: пассивный залог','https://www.native-english.ru/grammar/passive-voice',RU]]},

{id:'b1_13',text:'Passive Voice — Past Simple: was/were + V3',note:'The bridge was built in 1890. They were arrested.',
exp:`Past Simple Passive: <em>was/were + V3</em>
<br>• <em>was</em> — ед. число
<br>• <em>were</em> — мн. число
<br><br>Активный → Пассивный: <em>Someone stole my car.</em> → <em>My car was stolen.</em>`,
ex:[['The Eiffel Tower was built in 1889.','Эйфелева башня была построена в 1889 году.'],['Three people were injured in the accident.','В аварии пострадали три человека.']],
links:[['Past Passive exercise','https://www.perfect-english-grammar.com/passive-exercise-1.html',EN],['native-english.ru: пассивный залог','https://www.native-english.ru/grammar/passive-voice',RU]]},

{id:'b1_14',text:'Passive Voice — Present Perfect: has/have been + V3',note:'The car has been repaired. All invitations have been sent.',
exp:`Present Perfect Passive: <em>has/have been + V3</em>
<br><br>Используется когда важен результат в настоящем, а не то, когда именно это произошло.`,
ex:[['The project has been completed.','Проект завершён.'],['All the guests have been informed.','Всех гостей уведомили.']],
